<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstaFlow</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg:#f0f2f8; --card:#fff; --border:#e8ecf3;
      --text:#111827; --muted:#6b7280; --faint:#9ca3af;
      --sidebar:#fff; --topbar:#fff; --input-bg:#f5f7fc;
      --row-hover:#f9fafb; --shadow:0 4px 24px rgba(0,0,0,.07);
      --shadow-sm:0 1px 4px rgba(0,0,0,.06);
      --radius:14px; --radius-sm:10px;
    }
    body.dark {
      --bg:#0d1117; --card:#161b22; --border:#21262d;
      --text:#e6edf3; --muted:#8b949e; --faint:#484f58;
      --sidebar:#161b22; --topbar:#161b22; --input-bg:#0d1117;
      --row-hover:#1c2128; --shadow:0 4px 24px rgba(0,0,0,.4);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;transition:background .25s,color .25s;}

    /* ── Sidebar ── */
    .sidebar{width:228px;min-height:100vh;background:var(--sidebar);display:flex;flex-direction:column;border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;transition:background .25s;z-index:100;}
    .sidebar-logo{display:flex;align-items:center;gap:11px;padding:24px 20px 20px;font-weight:700;font-size:17px;color:var(--text);letter-spacing:-.3px;}
    .logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#f09433,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-icon svg{stroke:#fff;}
    .sidebar nav{flex:1;padding:0 10px;overflow-y:auto;}
    .nav-label{font-size:10px;color:var(--faint);font-weight:600;letter-spacing:.8px;padding:18px 10px 6px;text-transform:uppercase;}
    .nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13.5px;color:var(--muted);margin-bottom:1px;transition:all .18s;user-select:none;position:relative;}
    .nav-item:hover{background:var(--input-bg);color:var(--text);}
    .nav-item.active{background:#eef3ff;color:#3b6ef8;font-weight:600;}
    body.dark .nav-item.active{background:#1c2a4a;color:#5b8af8;}
    .nav-item svg{flex-shrink:0;transition:color .18s;}
    .nav-badge{margin-left:auto;background:#ef4444;color:#fff;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:20px;line-height:1.5;}
    .sidebar-footer{padding:14px 12px 18px;}
    .upgrade-card{padding:16px;border-radius:14px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;position:relative;overflow:hidden;}
    .upgrade-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:rgba(255,255,255,.1);border-radius:50%;}
    .upgrade-card::after{content:'';position:absolute;bottom:-30px;left:-10px;width:100px;height:100px;background:rgba(255,255,255,.06);border-radius:50%;}
    .upgrade-card h4{font-size:13px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:6px;}
    .upgrade-card p{font-size:11.5px;opacity:.8;margin-bottom:14px;line-height:1.55;}
    .upgrade-btn{width:100%;padding:9px;border:none;border-radius:9px;background:rgba(255,255,255,.95);color:#4f46e5;font-weight:700;font-size:12.5px;cursor:pointer;transition:all .2s;position:relative;z-index:1;}
    .upgrade-btn:hover{background:#fff;transform:translateY(-1px);}

    /* ── Main ── */
    .main{margin-left:228px;flex:1;display:flex;flex-direction:column;min-height:100vh;}

    /* ── Topbar ── */
    .topbar{display:flex;align-items:center;gap:12px;padding:14px 28px;background:var(--topbar);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;transition:background .25s;}
    .search-box{display:flex;align-items:center;gap:8px;background:var(--input-bg);border-radius:10px;padding:8px 14px;flex:1;max-width:340px;border:1px solid var(--border);transition:border-color .2s;}
    .search-box:focus-within{border-color:#3b6ef8;}
    .search-box svg{color:var(--faint);flex-shrink:0;}
    .search-box input{border:none;background:transparent;font-size:13.5px;outline:none;width:100%;color:var(--text);}
    .search-box input::placeholder{color:var(--faint);}
    .kbd{font-size:10px;color:var(--faint);background:var(--border);padding:2px 5px;border-radius:4px;font-family:monospace;}
    .topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;position:relative;}
    .icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--card);color:var(--muted);transition:all .18s;position:relative;}
    .icon-btn:hover{background:var(--input-bg);color:var(--text);}
    .icon-btn svg{stroke:currentColor;}
    .avatar{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#f09433,#dc2743);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:.5px;}
    .notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid var(--card);}

    /* ── Content ── */
    .content{padding:26px 28px;flex:1;}

    /* ── Page Header ── */
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
    .page-header h1{font-size:clamp(15px,1.6vw,21px);font-weight:700;letter-spacing:-.4px;}
    .page-header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .date-btn{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 13px;background:var(--card);font-size:13px;color:var(--muted);cursor:pointer;transition:border-color .2s;white-space:nowrap;}
    .date-btn:hover{border-color:#3b6ef8;color:var(--text);}
    .date-btn svg{color:var(--faint);}
    .btn-ghost{border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 13px;background:var(--card);font-size:13px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:6px;transition:all .2s;}
    .btn-ghost:hover{border-color:#3b6ef8;color:#3b6ef8;}
    .btn-primary{border:none;border-radius:var(--radius-sm);padding:7px 16px;background:#3b6ef8;color:#fff;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;box-shadow:0 2px 8px rgba(59,110,248,.3);}
    .btn-primary:hover{background:#2d5ce0;}

    /* ── KPI Cards ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
    .kpi-card{background:var(--card);border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border);cursor:pointer;transition:box-shadow .2s,transform .2s;}
    .kpi-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
    .kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:6px;}
    .kpi-label{font-size:12.5px;color:var(--muted);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .kpi-icon-box{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .kpi-value{font-size:clamp(14px,1.7vw,24px);font-weight:700;letter-spacing:-.5px;margin-bottom:5px;line-height:1.3;display:flex;flex-wrap:wrap;align-items:baseline;gap:5px;}
    .kpi-meta{font-size:11.5px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tag-up{color:#10b981;background:#ecfdf5;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;}
    .tag-down{color:#ef4444;background:#fef2f2;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;}

    /* ── Middle ── */
    .mid-row{display:grid;grid-template-columns:1fr 308px;gap:14px;margin-bottom:14px;}
    .bot-row{display:grid;grid-template-columns:1fr 308px;gap:14px;}

    /* ── Card ── */
    .card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);transition:background .25s,border-color .25s;}
    .card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
    .card-title{font-size:clamp(12.5px,1.2vw,14.5px);font-weight:700;letter-spacing:-.2px;}
    .card-menu{color:var(--faint);cursor:pointer;padding:4px;border-radius:6px;transition:background .15s;display:flex;align-items:center;}
    .card-menu:hover{background:var(--input-bg);color:var(--text);}
    .metric-big{font-size:clamp(16px,2vw,28px);font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
    .metric-sub{font-size:12.5px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px;}

    /* ── Period Tabs ── */
    .period-tabs{display:flex;gap:2px;background:var(--input-bg);border-radius:8px;padding:3px;}
    .ptab{padding:3px 10px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--faint);transition:all .18s;}
    .ptab.active{background:var(--card);color:#3b6ef8;box-shadow:var(--shadow-sm);}

    /* ── Audience ── */
    .aud-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
    .aud-item{border-radius:10px;padding:13px;}
    .aud-item.blue{background:#eff3ff;}
    .aud-item.green{background:#f0fdf4;}
    .aud-item.orange{background:#fff7ed;}
    body.dark .aud-item.blue{background:#1c2a4a;}
    body.dark .aud-item.green{background:#052e16;}
    body.dark .aud-item.orange{background:#431407;}
    .aud-icon{margin-bottom:8px;display:flex;align-items:center;}
    .aud-count{font-size:18px;font-weight:700;color:var(--text);}
    .aud-label{font-size:11px;color:var(--muted);margin-top:2px;}
    .aud-bar{height:3px;border-radius:3px;margin-top:8px;background:var(--border);}
    .aud-bar-fill{height:3px;border-radius:3px;}

    /* ── Day Bars ── */
    .day-wrap{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:10px;}
    .day-grp{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
    .day-bar{width:100%;border-radius:5px 5px 0 0;background:var(--border);transition:height .3s;}
    .day-bar.hi{background:linear-gradient(180deg,#5b8af8,#3b6ef8);}
    .day-lbl{font-size:10.5px;color:var(--faint);}
    .day-val{font-size:10px;font-weight:600;color:var(--muted);}

    /* ── Table ── */
    .data-table{width:100%;border-collapse:collapse;font-size:13px;}
    .data-table th{color:var(--faint);font-weight:500;padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;}
    .data-table td{padding:11px 10px;border-bottom:1px solid var(--bg);color:var(--text);}
    .data-table tbody tr{cursor:pointer;transition:background .13s;}
    .data-table tbody tr:hover{background:var(--row-hover);}
    .data-table tr:last-child td{border-bottom:none;}
    .post-thumb{width:34px;height:34px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;flex-shrink:0;}
    .post-name{display:inline-block;vertical-align:middle;margin-left:9px;max-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
    .num-pos{color:#10b981;font-weight:600;}
    .num-neg{color:#ef4444;font-weight:600;}
    .star-row{color:#f59e0b;font-size:12px;}

    /* ── Gauge ── */
    .gauge-wrap{position:relative;display:flex;flex-direction:column;align-items:center;padding:6px 0;}
    .gauge-val{position:absolute;bottom:26px;font-size:clamp(16px,2vw,26px);font-weight:700;letter-spacing:-.5px;}
    .link-btn{font-size:12.5px;color:#3b6ef8;cursor:pointer;font-weight:600;margin-top:4px;}
    .link-btn:hover{text-decoration:underline;}

    /* ── AI Chat ── */
    .ai-card{display:flex;flex-direction:column;}
    .ai-orb{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#60a5fa,#3b6ef8 60%,#1e40af);box-shadow:0 4px 18px rgba(59,110,248,.45);margin:8px auto;animation:float 3s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
    .ai-msgs{max-height:152px;overflow-y:auto;margin:8px 0;display:flex;flex-direction:column;gap:5px;}
    .ai-msg{background:var(--input-bg);border-radius:9px;padding:9px 11px;font-size:12.5px;color:var(--text);line-height:1.55;}
    .ai-msg.user{background:#eef3ff;align-self:flex-end;max-width:85%;}
    body.dark .ai-msg.user{background:#1c2a4a;}
    .ai-typing{display:inline-flex;gap:3px;padding:2px 0;}
    .ai-typing span{width:5px;height:5px;background:var(--faint);border-radius:50%;animation:blink 1s infinite;}
    .ai-typing span:nth-child(2){animation-delay:.2s;}
    .ai-typing span:nth-child(3){animation-delay:.4s;}
    @keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}
    .ai-row{display:flex;gap:7px;margin-top:8px;}
    .ai-input{flex:1;border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:13px;outline:none;background:var(--input-bg);color:var(--text);}
    .ai-input:focus{border-color:#3b6ef8;}
    .ai-send{border:none;background:#3b6ef8;color:#fff;border-radius:9px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
    .ai-send:hover{background:#2d5ce0;}
    .expand-btn{background:none;border:none;color:var(--faint);cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;transition:background .15s;}
    .expand-btn:hover{background:var(--input-bg);color:var(--text);}

    /* ── Dropdown ── */
    .dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);min-width:200px;z-index:300;overflow:hidden;animation:popIn .15s ease;}
    @keyframes popIn{from{opacity:0;transform:translateY(-6px)scale(.97);}to{opacity:1;transform:translateY(0)scale(1);}}
    .dd-item{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:13px;color:var(--text);cursor:pointer;transition:background .13s;}
    .dd-item:hover{background:var(--input-bg);}
    .dd-item.red{color:#ef4444;}
    .dd-item svg{color:var(--faint);flex-shrink:0;}
    .dd-item:hover svg{color:inherit;}
    .dd-sep{height:1px;background:var(--border);margin:3px 0;}
    .dd-hd{padding:10px 14px 5px;font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;}
    .notif-row{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .13s;display:flex;gap:9px;align-items:flex-start;}
    .notif-row:last-of-type{border-bottom:none;}
    .notif-row:hover{background:var(--input-bg);}
    .notif-dot2{width:7px;height:7px;background:#3b6ef8;border-radius:50%;margin-top:4px;flex-shrink:0;}
    .notif-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
    .notif-desc{font-size:11.5px;color:var(--muted);line-height:1.45;}
    .notif-time{font-size:11px;color:var(--faint);margin-top:3px;}

    /* ── Modal ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(2px);}
    .modal-overlay.open{display:flex;}
    .modal-box{background:var(--card);border-radius:18px;padding:26px;max-width:520px;width:90%;max-height:86vh;overflow-y:auto;position:relative;animation:modalIn .2s ease;box-shadow:0 24px 60px rgba(0,0,0,.18);border:1px solid var(--border);}
    .modal-box.wide{max-width:680px;}
    @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
    .modal-close{position:absolute;top:16px;right:16px;background:var(--input-bg);border:none;width:28px;height:28px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background .15s;}
    .modal-close:hover{background:var(--border);}
    .modal-title{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px;}

    /* ── Toast ── */
    .toast-container{position:fixed;bottom:22px;right:22px;z-index:2000;display:flex;flex-direction:column;gap:7px;}
    .toast{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 16px;font-size:13px;color:var(--text);box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;animation:slideIn .25s ease;min-width:230px;}
    @keyframes slideIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
    .toast.success{border-left:3px solid #10b981;}
    .toast.info{border-left:3px solid #3b6ef8;}
    .toast.warn{border-left:3px solid #f59e0b;}
    .toast svg{flex-shrink:0;}

    /* ── Widget grid ── */
    .widget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .widget-opt{border:1.5px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .18s;text-align:center;}
    .widget-opt:hover,.widget-opt.sel{border-color:#3b6ef8;background:#eef3ff;}
    body.dark .widget-opt:hover,body.dark .widget-opt.sel{background:#1c2a4a;}
    .wo-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;}
    .wo-name{font-size:12.5px;font-weight:600;color:var(--text);}
    .wo-desc{font-size:11px;color:var(--faint);margin-top:3px;}

    /* ── Misc pages ── */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:18px;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;}
    .stat-big{font-size:clamp(18px,2.2vw,30px);font-weight:700;letter-spacing:-.5px;}
    .stat-lbl{font-size:12.5px;color:var(--muted);margin-top:5px;}
    .coming{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;}
    .coming-icon{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;background:var(--input-bg);}
    .coming h2{font-size:clamp(15px,1.6vw,20px);font-weight:700;margin-bottom:8px;}
    .coming p{font-size:13.5px;color:var(--muted);max-width:320px;line-height:1.65;}
    .form-group{margin-bottom:13px;}
    .form-group label{display:block;font-size:11.5px;font-weight:600;color:var(--faint);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
    .form-input{width:100%;border:1px solid var(--border);background:var(--input-bg);color:var(--text);border-radius:9px;padding:9px 13px;font-size:13.5px;outline:none;transition:border-color .18s;}
    .form-input:focus{border-color:#3b6ef8;}
    .form-row{display:flex;gap:12px;margin-bottom:13px;}
    .form-row .form-group{flex:1;margin-bottom:0;}
    .settings-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bg);}
    .settings-row:last-child{border-bottom:none;}
    .toggle{width:40px;height:22px;background:var(--border);border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
    .toggle.on{background:#3b6ef8;}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
    .toggle.on::after{transform:translateX(18px);}
    .hash-bar-bg{background:var(--input-bg);border-radius:4px;height:6px;overflow:hidden;}
    .hash-bar{height:6px;border-radius:4px;background:linear-gradient(90deg,#3b6ef8,#60a5fa);}
    .tag{display:inline-block;background:#eef3ff;color:#3b6ef8;border-radius:20px;padding:2px 9px;font-size:11.5px;font-weight:600;margin:2px;}
    body.dark .tag{background:#1c2a4a;color:#5b8af8;}

    /* ── Meta Ads ── */
    .meta-header-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#1877f2,#0866ff);color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:10px;vertical-align:middle;}
    .kpi8{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;}
    .status-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;}
    .s-active{background:#dcfce7;color:#16a34a;}
    .s-pause{background:#fef9c3;color:#ca8a04;}
    .s-end{background:var(--input-bg);color:var(--faint);}
    body.dark .s-active{background:#052e16;}
    body.dark .s-pause{background:#422006;}
    .sdot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;}
    .creative-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:box-shadow .2s;}
    .creative-card:hover{box-shadow:var(--shadow);}
    .creative-prev{height:88px;display:flex;align-items:center;justify-content:center;}
    .meta-tab{display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
    .meta-tab-item{flex:1;padding:8px;text-align:center;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--muted);background:var(--card);transition:all .18s;border-right:1px solid var(--border);}
    .meta-tab-item:last-child{border-right:none;}
    .meta-tab-item.on{background:#1877f2;color:#fff;}
    .budget-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
    .budget-track{height:7px;background:var(--input-bg);border-radius:4px;overflow:hidden;margin-bottom:10px;}
    .budget-fill{height:7px;border-radius:4px;}
    .insight-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bg);}
    .insight-row:last-child{border-bottom:none;}
    .change-up{color:#10b981;font-size:11.5px;font-weight:600;}
    .change-dn{color:#ef4444;font-size:11.5px;font-weight:600;}
    .roas-bar{height:5px;border-radius:3px;background:var(--input-bg);margin-top:4px;}
    .roas-fill{height:5px;border-radius:3px;background:linear-gradient(90deg,#1877f2,#60a5fa);}

    /* scrollbar */
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

    /* ── Overflow prevention ── */
    html{overflow-x:hidden;}
    body{overflow-x:hidden;}
    .kpi-grid>*,.kpi8>*,.mid-row>*,.bot-row>*,.stat-grid>*,.widget-grid>*,.aud-grid>*,.form-row>*{min-width:0;}
    .card{overflow:hidden;}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    canvas{max-width:100%;}

    /* ── Hamburger ── */
    .hamburger{display:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--border);align-items:center;justify-content:center;cursor:pointer;background:var(--card);color:var(--muted);flex-shrink:0;}
    .hamburger:hover{background:var(--input-bg);color:var(--text);}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;backdrop-filter:blur(1px);}
    .sidebar-overlay.show{display:block;}

    /* ── Responsive ── */
    /* 1400px: 사이드바(228)+콘텐츠 → kpi 4열이 너무 좁아짐 */
    @media (max-width:1400px){
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .kpi8{grid-template-columns:repeat(2,1fr);}
    }
    /* 1200px: 보조 패널 스택 */
    @media (max-width:1200px){
      .mid-row,.bot-row{grid-template-columns:1fr;}
      .aud-grid{grid-template-columns:repeat(2,1fr);}
      .search-box{max-width:220px;}
    }
    /* 900px: 사이드바 숨김 + 햄버거 */
    @media (max-width:900px){
      .sidebar{transform:translateX(-228px);transition:background .25s,transform .25s;}
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.18);}
      .main{margin-left:0;}
      .hamburger{display:flex;}
      .content{padding:16px 14px;}
      .topbar{padding:11px 14px;gap:8px;}
      .search-box{max-width:100%;flex:1;}
      .kbd{display:none;}
    }
    /* 640px: 단일 열 + 모바일 최적화 */
    @media (max-width:640px){
      .kpi-grid,.kpi8{grid-template-columns:1fr;}
      .aud-grid{grid-template-columns:1fr;}
      .page-header{flex-direction:column;align-items:flex-start;}
      .page-header-right{width:100%;flex-wrap:wrap;}
      .form-row{flex-direction:column;}
      .widget-grid{grid-template-columns:repeat(2,1fr);}
      .stat-grid{grid-template-columns:repeat(2,1fr);}
      .topbar-right .icon-btn:not(#themeBtn):not(#notifBtn){display:none;}
      /* 인라인 그리드 오버라이드 */
      [style*="grid-template-columns:1fr 1fr"],[style*="grid-template-columns: 1fr 1fr"]{grid-template-columns:1fr!important;}
      [style*="grid-template-columns:repeat(3"],[style*="grid-template-columns: repeat(3"]{grid-template-columns:1fr!important;}
      [style*="grid-template-columns:repeat(2"],[style*="grid-template-columns: repeat(2"]{grid-template-columns:1fr!important;}
      /* 테이블 스크롤 */
      .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
      /* 모달 */
      .modal-box{width:calc(100vw - 24px)!important;padding:20px 18px;max-height:88vh;}
      /* 카드 패딩 축소 */
      .card{padding:14px;}
      /* 검색박스 숨김 */
      .search-box{display:none;}
    }
    /* 480px: 소형 폰 */
    @media (max-width:480px){
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .content{padding:12px 10px 80px;}
      .topbar{padding:10px 12px;}
      .page-header h1{font-size:16px;}
      /* 버튼 텍스트 숨김 (아이콘만) */
      .page-header-right .btn-ghost span,.page-header-right .btn-primary span{display:none;}
      /* 하단 네비게이션 바 */
      .mobile-nav{display:flex;}
    }
    /* 모바일 하단 네비게이션 */
    .mobile-nav{
      display:none;
      position:fixed;bottom:0;left:0;right:0;
      background:var(--card);border-top:1px solid var(--border);
      z-index:200;padding:8px 0 max(8px,env(safe-area-inset-bottom));
      justify-content:space-around;align-items:center;
    }
    .mobile-nav-item{
      display:flex;flex-direction:column;align-items:center;gap:3px;
      padding:4px 12px;border-radius:10px;cursor:pointer;
      font-size:10px;color:var(--muted);transition:color .15s;
      min-width:52px;
    }
    .mobile-nav-item.active{color:#3b6ef8;}
    .mobile-nav-item svg{width:20px;height:20px;stroke:currentColor;}
    @media (max-width:900px){
      .mobile-nav{display:flex;}
      .content{padding-bottom:72px;}
    }
    /* 더보기 우측 드로어 */
    .more-drawer-bg{
      position:fixed;inset:0;background:rgba(0,0,0,.45);
      z-index:400;opacity:0;pointer-events:none;
      transition:opacity .25s;
    }
    .more-drawer-bg.open{opacity:1;pointer-events:auto;}
    .more-drawer{
      position:fixed;top:0;right:0;bottom:0;width:280px;max-width:85vw;
      background:var(--card);z-index:401;
      transform:translateX(100%);
      transition:transform .3s cubic-bezier(.4,0,.2,1);
      display:flex;flex-direction:column;
      padding-bottom:max(8px,env(safe-area-inset-bottom));
      overflow-y:auto;
    }
    .more-drawer.open{transform:translateX(0);}
    .more-drawer-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:20px 18px 14px;
      border-bottom:1px solid var(--border);
    }
    .more-drawer-title{font-size:16px;font-weight:700;color:var(--text);}
    .more-drawer-close{
      width:30px;height:30px;border-radius:50%;border:none;
      background:var(--hover);color:var(--muted);cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:18px;
    }
    .more-drawer-section-label{
      font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;
      text-transform:uppercase;padding:14px 18px 6px;
    }
    .more-drawer-item{
      display:flex;align-items:center;gap:12px;
      padding:12px 18px;cursor:pointer;
      font-size:14px;color:var(--text);
      transition:background .12s;
    }
    .more-drawer-item:hover{background:var(--hover);}
    .more-drawer-item.active{color:#3b6ef8;font-weight:600;}
    .more-drawer-item svg{width:18px;height:18px;stroke:currentColor;flex-shrink:0;}

    .more-drawer-item .nav-badge.new-badge{
      background:linear-gradient(135deg,#1877f2,#0866ff);
    }
  </style>
</head>

async function igFetchAllData() {
  const token = localStorage.getItem('ig_token');
  if (!token) return;

  const ig = (path) => fetch(`https://graph.instagram.com${path}&access_token=${token}`).then(r=>r.json());
  const igPost = (path) => fetch(`https://graph.instagram.com${path}`, {method:'GET'}).then(r=>r.json());

  try {
    // 1. Profile
    const profile = await ig('/me?fields=id,username,name,account_type,followers_count,media_count,biography,website,profile_picture_url');
    if (profile.error) { console.warn('[InstaFlow] Profile:', profile.error.message); return; }
    console.log('[InstaFlow] account_type:', profile.account_type, '— insights requires BUSINESS or CREATOR');
    const uid = profile.id;
    const fc = profile.followers_count || 1;

    // 2. Recent media
    const mediaJson = await ig('/me/media?fields=id,caption,media_type,timestamp,like_count,comments_count,permalink&limit=30');
    const media = mediaJson.data || [];

    // 3. Engagement from media (no extra permission)
    const mediaEngRate = media.length
      ? (media.reduce((s,m)=>s+((m.like_count||0)+(m.comments_count||0)),0) / media.length / fc * 100)
      : null;

    // 4. Account insights — requires instagram_business_manage_insights
    // graph.instagram.com must be used (graph.facebook.com rejects Instagram tokens)
    let insights = { reach:null, total_interactions:null, profile_views:null, follower_history:[], needsPermission:false };
    const now = Math.floor(Date.now()/1000);
    const since30 = now - 30*24*3600;

    const fetchInsight = async (metric, period, extra='') => {
      const url = `https://graph.instagram.com/me/insights?metric=${metric}&period=${period}${extra}&access_token=${token}`;
      const j = await fetch(url).then(r=>r.json());
      if (j.error) {
        console.warn(`[InstaFlow] ${metric}:`, j.error.code, j.error.message);
        if ([10, 200, 3, 190].includes(j.error.code)) {
          insights.needsPermission = true;
        }
        return null;
      }
      // Return {} (truthy) when data array is empty — no error means metric is accessible, value = 0
      return j.data?.[0] ?? {};
    };

    // 4a. Reach (days_28)
    try {
      const d = await fetchInsight('reach','days_28');
      if (d) insights.reach = d.values?.reduce((s,v)=>s+(v.value||0),0) ?? d.value ?? 0;
    } catch(e) {}

    // 4b. Total interactions (likes+comments+shares+saves) — replaces deprecated 'impressions'
    if (!insights.needsPermission) {
      try {
        const d = await fetchInsight('total_interactions','days_28');
        if (d) insights.total_interactions = d.values?.reduce((s,v)=>s+(v.value||0),0) ?? d.value ?? 0;
      } catch(e) {}
    }

    // 4c. Profile views — API success (no error) = metric available, value may be 0
    if (!insights.needsPermission) {
      for (const m of ['profile_views','website_clicks']) {
        try {
          const d = await fetchInsight(m,'days_28');
          if (d) {
            // d.values may be empty array or missing — default to 0 when API succeeds
            const val = d.values?.reduce((s,v)=>s+(v.value||0),0) ?? d.value ?? 0;
            insights.profile_views = val;
            break;
          }
        } catch(e) {}
      }
    }

    // 5. Follower history (daily, last 30 days) — follower_count only supports period=day
    if (!insights.needsPermission) {
      try {
        const url = `https://graph.instagram.com/me/insights?metric=follower_count&period=day&since=${since30}&until=${now}&access_token=${token}`;
        const fJson = await fetch(url).then(r=>r.json());
        if (!fJson.error && fJson.data?.[0]) {
          insights.follower_history = fJson.data[0].values || [];
        } else if (fJson.error) {
          console.warn('[InstaFlow] follower_count:', fJson.error.code, fJson.error.message);
        }
      } catch(e) {}
    }

    // 4d. Follows & unfollows (daily, last 30 days)
    if (!insights.needsPermission) {
      try {
        const fuUrl = `https://graph.instagram.com/me/insights?metric=follows_and_unfollows&period=day&since=${since30}&until=${now}&access_token=${token}`;
        const fuJson = await fetch(fuUrl).then(r=>r.json());
        if (!fuJson.error && fuJson.data?.[0]) {
          insights.follows_history = fuJson.data[0].values || [];
        }
      } catch(e) {}
    }

    console.log('[InstaFlow] insights:', { reach:insights.reach, total_interactions:insights.total_interactions, profile_views:insights.profile_views, needsPermission:insights.needsPermission });

    // 6. Per-media insights (reach, impressions, saved, video_views per post)
    let mediaInsights = {};
    if (!insights.needsPermission) {
      try {
        const top = media.slice(0, 15);
        const results = await Promise.allSettled(
          top.map(m => ig(`/${m.id}/insights?metric=reach,total_interactions,saved${m.media_type==='VIDEO'||m.media_type==='REELS'?',video_views,plays':''}`))
        );
        results.forEach((r, i) => {
          if (r.status==='fulfilled' && !r.value.error && r.value.data) {
            const obj = {};
            r.value.data.forEach(d => { obj[d.name] = d.values?.[0]?.value ?? 0; });
            mediaInsights[top[i].id] = obj;
          }
        });
      } catch(e) {}
    }

    // 7. Comments from top 5 most liked posts
    // instagram_business_basic: id,text,timestamp,like_count OK
    // instagram_manage_comments: adds from{id,username} (commenter info)
    let commentsMap = {};
    try {
      const topPosts = [...media].sort((a,b)=>(b.like_count||0)-(a.like_count||0)).slice(0,5);
      const results = await Promise.allSettled(
        topPosts.map(m => ig(`/${m.id}/comments?fields=id,text,timestamp,like_count,username&limit=10`))
      );
      results.forEach((r, i) => {
        if (r.status==='fulfilled' && !r.value.error) {
          // Store even if data=[] — lets us distinguish "fetched but empty" vs "not fetched"
          commentsMap[topPosts[i].id] = { post: topPosts[i], comments: r.value.data || [] };
        }
      });
      console.log('[InstaFlow] commentsMap posts:', Object.keys(commentsMap).length,
        'total comments:', Object.values(commentsMap).reduce((s,v)=>s+v.comments.length,0));
    } catch(e) { console.warn('[InstaFlow] comments fetch:', e); }

    // 8. Audience demographics — new API uses follower_demographics with breakdown param
    let audience = { gender_age:{}, country:{}, city:{}, hasData:false };
    if (!insights.needsPermission) {
      try {
        // Gender+Age breakdown
        const gaJson = await fetch(`https://graph.instagram.com/me/insights?metric=follower_demographics&period=lifetime&breakdown=gender,age&access_token=${token}`).then(r=>r.json());
        if (!gaJson.error && gaJson.data?.[0]) {
          const breakdowns = gaJson.data[0].total_value?.breakdowns?.[0]?.results || [];
          breakdowns.forEach(r => {
            const [gender, age] = r.dimension_values;
            const key = `${gender}.${age}`;
            audience.gender_age[key] = r.value;
          });
        }
        // Country breakdown
        const cJson = await fetch(`https://graph.instagram.com/me/insights?metric=follower_demographics&period=lifetime&breakdown=country&access_token=${token}`).then(r=>r.json());
        if (!cJson.error && cJson.data?.[0]) {
          const breakdowns = cJson.data[0].total_value?.breakdowns?.[0]?.results || [];
          breakdowns.forEach(r => {
            audience.country[r.dimension_values[0]] = r.value;
          });
        }
        audience.hasData = Object.keys(audience.gender_age).length > 0 || Object.keys(audience.country).length > 0;
        console.log('[InstaFlow] audience:', { gender_age: Object.keys(audience.gender_age).length, country: Object.keys(audience.country).length });
      } catch(e) { console.warn('[InstaFlow] audience error:', e); }
    }

    // 9. Stories + per-story insights
    let stories = [];
    try {
      const sJson = await ig('/me/stories?fields=id,media_type,timestamp,like_count');
      if (!sJson.error && sJson.data?.length) {
        const raw = sJson.data || [];
        const insightResults = await Promise.allSettled(
          raw.map(s => ig(`/${s.id}/insights?metric=impressions,reach,replies,taps_forward,taps_back,exits`))
        );
        stories = raw.map((s, i) => {
          const ins = {};
          if (insightResults[i].status === 'fulfilled' && !insightResults[i].value.error) {
            (insightResults[i].value.data || []).forEach(d => { ins[d.name] = d.values?.[0]?.value ?? 0; });
          }
          return { ...s, insights: ins };
        });
      }
    } catch(e) { console.warn('[InstaFlow] stories:', e); }

    igLiveData = { profile, media, mediaInsights, commentsMap, insights, audience, stories, mediaEngRate, fetchedAt: new Date().toISOString() };

    // Update follower chart periods with real data
    if (insights.follower_history?.length > 1) {
      const vals   = insights.follower_history.map(v => v.value || 0);
      const labels = insights.follower_history.map(v => {
        const d = new Date((v.end_time || '') || Date.now());
        return `${d.getMonth()+1}/${d.getDate()}`;
      });
      periods['30일'].data   = vals;
      periods['30일'].labels = labels;
      // Scale 7/14-day from real current count
      ['7일','14일'].forEach(k => {
        periods[k].data = periods[k].data.map((v,i,a) => Math.round(fc * v / a[a.length-1]));
      });
    } else if (fc > 0) {
      Object.keys(periods).forEach(k => {
        periods[k].data = periods[k].data.map((v,i,a) => Math.round(fc * v / a[a.length-1]));
      });
    }

    return igLiveData;
  } catch(e) {
    console.warn('[InstaFlow] Fetch error:', e);
  }
}

  const avatarBgs  = ['#fef9c3','#dbeafe','#dcfce7','#ede9fe','#fee2e2','#fff7ed','#f0fdf4','#fce7f3'];
  const avatarCols = ['#ca8a04','#2563eb','#16a34a','#7c3aed','#dc2626','#ea580c','#16a34a','#be185d'];

  Object.values(igLiveData.commentsMap).forEach(({ post, comments }) => {
    comments.forEach((c, ci) => {
      const t = c.text || '';
      const isPos = sentPos.some(w => t.includes(w));
      const isNeg = sentNeg.some(w => t.includes(w));
      // API returns 'username' directly (with instagram_business_basic)
      // or 'from.username' (with instagram_manage_comments)
      const username = c.username || c.from?.username || null;
      const displayName = username || '댓글 작성자';
      const avatar   = username ? username[0].toUpperCase() : '?';
      const posted   = new Date(c.timestamp);
      const diff     = Math.floor((Date.now() - posted) / 60000);
      const timeStr  = diff < 60 ? `${diff}분 전` : diff < 1440 ? `${Math.floor(diff/60)}시간 전` : `${Math.floor(diff/1440)}일 전`;
      list.push({
        post: (post.caption||'').replace(/#[\w가-힣]+/g,'').trim().slice(0,20) || '게시물',
        user: displayName, avatar,
        avatarBg:  avatarBgs[ci % avatarBgs.length],
        avatarCol: avatarCols[ci % avatarCols.length],
        text: t, time: timeStr,
        sentiment: isNeg ? 'neg' : isPos ? 'pos' : 'neu',
        likes: c.like_count || 0,
        hasUsername: !!username,
      });
    });
  });

  // Return list if any comments found; return empty array (truthy) to signal "fetched but no comments"
  if (list.length > 0) return list;
  // commentsMap was fetched successfully but all posts had 0 comments
  if (Object.keys(igLiveData.commentsMap).length > 0) return [];
  return null;
}

function igLiveAudience() {
  if (!igLiveData?.audience?.hasData) return null;
  const ga = igLiveData.audience.gender_age;
  const countryCounts = igLiveData.audience.country;
  const fc = igLiveData.profile?.followers_count || 1;

  // Calculate gender from gender_age breakdown
  let female = 0, male = 0;
  const ageBuckets = {};
  const gaTotal = Object.values(ga).reduce((s,v)=>s+v, 0) || 0;
  Object.entries(ga).forEach(([k, v]) => {
    const [gender, age] = k.split('.');
    if (gender === 'F') female += v;
    if (gender === 'M') male   += v;
    ageBuckets[age] = (ageBuckets[age] || 0) + v;
  });

  // Total for percentage: use gender_age total if available, otherwise country total, fallback to followers
  const countryTotal = Object.values(countryCounts).reduce((s,v)=>s+v, 0) || 0;
  const total = (gaTotal || countryTotal || fc);

  // Overseas = all non-KR countries
  const overseasCount = Object.entries(countryCounts)
    .filter(([code]) => code !== 'KR')
    .reduce((s,[,v]) => s+v, 0);
  const overseasPct = countryTotal > 0 ? Math.round(overseasCount / countryTotal * 100) : null;

  const names = {KR:'한국',US:'미국',JP:'일본',TH:'태국',SG:'싱가포르',TW:'대만',GB:'영국',CA:'캐나다',AU:'호주',IN:'인도',CN:'중국',VN:'베트남',FR:'프랑스',DE:'독일',PH:'필리핀',ID:'인도네시아',MY:'말레이시아',BR:'브라질',MX:'멕시코'};
  const topCountries = Object.entries(countryCounts)
    .sort((a,b)=>b[1]-a[1]).slice(0,5)
    .map(([code, cnt]) => ({
      name: names[code]||code,
      pct: countryTotal > 0 ? Math.round(cnt/countryTotal*100) : 0,
      count: Math.round(cnt)
    }));
  const ageOrder = ['13-17','18-24','25-34','35-44','45-54','55-64','65+'];
  const ageData = ageOrder.map(a => gaTotal > 0 ? Math.round((ageBuckets[a]||0)/gaTotal*100) : 0);
  const femalePct = gaTotal > 0 ? Math.round(female/gaTotal*100) : null;
  const malePct   = gaTotal > 0 ? Math.round(male/gaTotal*100)   : null;
  return {
    female: femalePct,
    male:   malePct,
    other:  femalePct != null ? Math.max(0, 100 - femalePct - (malePct||0)) : null,
    overseasPct,
    overseasCount: Math.round(overseasCount),
    ageData, ageOrder, topCountries,
    femaleCount:  Math.round(female),
    maleCount:    Math.round(male),
  };
}

async function igDebugInsights() {
  const token = localStorage.getItem('ig_token');
  if (!token) { toast('토큰이 없습니다', 'warn'); return; }
  toast('계정 정보 확인 중...', 'info');
  const profile = await fetch(`https://graph.instagram.com/me?fields=id,username,account_type,media_count,followers_count&access_token=${token}`).then(r=>r.json());
  if (profile.error) { toast('토큰 오류: ' + profile.error.message, 'error'); return; }

  const uid = profile.id;
  const accountType = profile.account_type || '알 수 없음';
  toast(`UID: ${uid} (${accountType}) · 인사이트 테스트 중...`, 'info');

  const results = [`👤 계정: @${profile.username} (${accountType})`, `🆔 UID: ${uid}`, ``];

  // Test metrics with correct endpoint and correct periods
  // ALL must use graph.instagram.com (NOT graph.facebook.com)
  const tests = [
    { metric:'reach',              period:'days_28' },
    { metric:'total_interactions', period:'days_28' },
    { metric:'accounts_engaged',   period:'days_28' },
    { metric:'profile_views',      period:'days_28' },
    { metric:'follower_count',     period:'day'     },
    { metric:'website_clicks',     period:'days_28' },
    { metric:'follows_and_unfollows', period:'days_28' },
  ];

  for (const t of tests) {
    try {
      const url = `https://graph.instagram.com/me/insights?metric=${t.metric}&period=${t.period}&access_token=${token}`;
      const r = await fetch(url).then(res=>res.json());
      if (r.error) {
        results.push(`${t.metric} (${t.period}): ❌ ${r.error.code} — ${r.error.message?.split('(')[0].trim()}`);
      } else {
        const val = r.data?.[0]?.values?.reduce((s,v)=>s+(v.value||0),0) ?? r.data?.[0]?.values?.[0]?.value ?? 'ok';
        results.push(`${t.metric} (${t.period}): ✅ ${val}`);
      }
    } catch(e) { results.push(`${t.metric}: ❌ 네트워크 오류`); }
  }

  // Check if account type is BUSINESS or CREATOR (required for insights)
  if (accountType === 'PERSONAL') {
    results.push(``, `⚠️ 개인 계정은 인사이트 API를 지원하지 않습니다.`);
    results.push(`비즈니스 또는 크리에이터 계정으로 전환 필요`);
  } else if (accountType === 'BUSINESS' || accountType === 'CREATOR') {
    results.push(``, `✅ 계정 유형 정상 (${accountType})`);
  }

  console.log('[InstaFlow Debug]', results.join('\n'));
  openModal(`
    <div class="modal-title">${ic('terminal',16)} 인사이트 API 진단</div>
    <pre style="font-size:11.5px;background:var(--input-bg);padding:14px;border-radius:10px;overflow-x:auto;white-space:pre-wrap;line-height:1.7">${results.join('\n')}</pre>
    <div style="font-size:12px;color:var(--muted);margin-top:10px;padding:10px;background:var(--input-bg);border-radius:8px">
      💡 모두 ✅이면 인사이트 정상 / ❌ 190은 토큰 scope 문제 → 권한 추가 후 토큰 재발급 필요

      <button class="btn-primary" style="flex:1;justify-content:center" onclick="closeModal();setTimeout(showInsightsPermGuide,200)">${ic('lock',13)} 권한 추가 방법</button>

// Extract hashtag stats from real media data
function buildLiveHashtagStats() {
  if (!igLiveData?.media?.length) return null;
  const hashMap = {};
  igLiveData.media.forEach(m => {
    const tags = (m.caption || '').match(/#[\w가-힣]+/g) || [];
    if (!tags.length) return;
    const mi    = igLiveData.mediaInsights?.[m.id] || {};
    const likes = m.like_count || 0;
    const comments = m.comments_count || 0;
    const saves = mi.saved || Math.round(likes * 0.18);
    const reach = mi.reach || Math.round((likes + 1) * 6);
    tags.forEach(rawTag => {
      const tag = rawTag.toLowerCase();
      if (!hashMap[tag]) hashMap[tag] = { tag, posts:0, likes:0, comments:0, saves:0, reach:0 };
      hashMap[tag].posts++;
      hashMap[tag].likes += likes;
      hashMap[tag].comments += comments;
      hashMap[tag].saves += saves;
      hashMap[tag].reach += reach;
    });
  });
  return Object.values(hashMap)
    .sort((a,b) => b.reach - a.reach)
    .map(t => ({
      ...t,
      avgEng: t.reach > 0 ? parseFloat(((t.likes+t.comments+t.saves)/t.reach*100).toFixed(1)) : 0,
    }));
}

function initMetaCharts() {
  // Spend vs ROAS dual-axis
  const spendEl = document.getElementById('metaSpendChart');
  if (spendEl) {
    new Chart(spendEl.getContext('2d'), {
      data: {
        labels: ['1/1','1/5','1/9','1/13','1/17','1/21','1/25','1/29','2/1'],
        datasets: [
          { type:'bar', label:'광고 지출 (₩)', data:[98000,134000,121000,158000,145000,172000,189000,162000,148000], backgroundColor:'rgba(24,119,242,.15)', borderRadius:5, yAxisID:'y' },
          { type:'line', label:'ROAS', data:[3.1,3.4,3.2,3.8,3.6,4.1,4.4,3.9,4.2], borderColor:'#10b981', backgroundColor:'transparent', borderWidth:2.5, pointRadius:3, pointBackgroundColor:'#10b981', tension:.4, yAxisID:'y2' },
        ]
      },
      options: {
        responsive:true,
        plugins:{ legend:{ position:'top', labels:{ boxWidth:10, font:{size:11} } }, tooltip:{ mode:'index', intersect:false } },
        scales:{
          x:{ grid:{display:false}, ticks:{font:{size:11},color:'#9ca3af'} },
          y:{ position:'left', grid:{color:'rgba(0,0,0,.04)'}, ticks:{ font:{size:11}, color:'#9ca3af', callback:v=>'₩'+v.toLocaleString() } },
          y2:{ position:'right', grid:{display:false}, ticks:{ font:{size:11}, color:'#10b981', callback:v=>v+'x' } },
        }
      }
    });
  }
  // Budget donut
  const budgetEl = document.getElementById('metaBudgetChart');
  if (budgetEl) {
    new Chart(budgetEl.getContext('2d'), {
      type:'doughnut',
      data:{ labels:['전환','인지도','트래픽','앱 설치'], datasets:[{ data:[48,24,18,10], backgroundColor:['#1877f2','#10b981','#f59e0b','#ec4899'], borderWidth:0, hoverOffset:6 }] },
      options:{ cutout:'68%', plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>' '+ctx.label+': '+ctx.raw+'%' } } } }
    });
  }
  // Device chart
  const deviceEl = document.getElementById('metaDeviceChart');
  if (deviceEl) {
    new Chart(deviceEl.getContext('2d'), {
      type:'bar',
      data:{
        labels:['Mobile','Desktop','Tablet'],
        datasets:[
          { label:'클릭수', data:[32400,12800,3091], backgroundColor:'#1877f2', borderRadius:6 },
          { label:'전환수', data:[820,340,80], backgroundColor:'#10b981', borderRadius:6 },
        ]
      },
      options:{ plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{size:11} } } }, scales:{ x:{grid:{display:false}}, y:{grid:{color:'rgba(0,0,0,.04)'}} } }
    });
  }
  // Bind card menus
  document.querySelectorAll('[data-menu^="meta"]').forEach(el=>{
    el.onclick=e=>{
      e.stopPropagation();
      mkDD(el,`
        <div class="dd-item" onclick="toast('CSV 내보내기 완료!','success');closeDD()">${ic('download',13)} CSV 내보내기</div>
        <div class="dd-item" onclick="toast('링크 복사 완료','info');closeDD()">${ic('link',13)} 공유하기</div>
        <div class="dd-item" onclick="navigate('meta');closeDD()">${ic('refresh-cw',13)} 새로고침</div>`);
    };
  });
  // Period tabs
  document.querySelectorAll('#metaPeriodBtn') && document.getElementById('metaPeriodBtn')?.addEventListener('click', e=>{
    e.stopPropagation();
    mkDD(document.getElementById('metaPeriodBtn'), ['7일','14일','30일','90일'].map(p=>`<div class="dd-item" onclick="toast('기간이 ${p}로 변경되었습니다','success');closeDD()">${p}</div>`).join(''));
  });
  document.getElementById('metaCreateBtn')?.addEventListener('click', ()=>metaCreateCampaign());
  document.getElementById('metaExportBtn')?.addEventListener('click', ()=>metaExportReport());
  document.getElementById('metaDateBtn')?.addEventListener('click', ()=>openModal(`
    <div class="modal-title">기간 선택</div>
    <div class="form-row">
      <div class="form-group"><label>시작일</label><input type="date" class="form-input" id="sd" value="2025-01-01"/></div>
      <div class="form-group"><label>종료일</label><input type="date" class="form-input" id="ed" value="2025-02-01"/></div>

    </div>
    <button class="btn-primary" style="width:100%" onclick="applyDate()">적용하기</button>`));
}

function switchMetaPeriod(btn, p) {
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

}

function pgGrowth() {
  const fc   = igLive('profile.followers_count', 48291);
  const fh   = igLiveData?.insights?.follower_history || [];
  const fuH  = igLiveData?.insights?.follows_history  || [];
  const isLive = !!igLiveData;

  // Compute stats from follower history
  let netGrowth = isLive ? '–' : '＋10,291';
  let growthRate = isLive ? '–' : '12.3%';
  let rateNum = 0;
  let nextMonth = isLive ? (fc + Math.ceil(fc * 0.05)).toLocaleString() : '50,100';

  if (fh.length > 1) {
    const first = fh[0]?.value || 0;
    const last  = fh[fh.length-1]?.value || fc;
    const net   = last - first;
    netGrowth   = (net >= 0 ? '＋' : '') + net.toLocaleString();
    rateNum     = first > 0 ? parseFloat(((last - first) / first * 100).toFixed(1)) : 0;
    growthRate  = rateNum + '%';
    nextMonth   = Math.round(last * (1 + rateNum/100)).toLocaleString();
  }

  // Follows/unfollows stats
  const netFollows = fuH.reduce((s,v) => s + ((v.value?.follows||0) - (v.value?.unfollows||0)), 0);

  // Dynamic milestones based on actual fc
  const allMilestones = [100,200,500,1000,2000,5000,10000,20000,50000,100000];
  const passedMilestones = allMilestones.filter(m => fc >= m);
  const upcomingMilestones = allMilestones.filter(m => fc < m).slice(0,3);

    ? Math.max(0, (fh[fh.length-1]?.value||fc) - (fh[0]?.value||fc)) / fh.length

    ...passedMilestones.slice(-2).map(m => ({

  const neuCount = total - posCount - negCount;

function initCommentSentimentChart() {
  const el = document.getElementById('commentSentimentChart'); if(!el) return;
  const lc = igLiveCommentsList();
  let pos=88, neu=7, neg=5;
  if (lc?.length) {
    const t = lc.length;
    pos = Math.round(lc.filter(c=>c.sentiment==='pos').length/t*100);
    neu = Math.round(lc.filter(c=>c.sentiment==='neu').length/t*100);
    neg = Math.max(0, 100 - pos - neu);
  }
  new Chart(el.getContext('2d'), {
    type:'doughnut',
    data:{ labels:['긍정','중립','부정'], datasets:[{ data:[pos,neu,neg], backgroundColor:['#10b981','#94a3b8','#ef4444'], borderWidth:0, hoverOffset:6 }] },
    options:{ plugins:{ legend:{ position:'bottom', labels:{ font:{size:12}, padding:16 } } }, cutout:'62%' }
  });
}

function initCommentTrendChart() {
  const el = document.getElementById('commentTrendChart');
  if(!el) return;
  let labels, data, isReal = false;

  if (igLiveData?.media?.length) {
    // Real: top 5 posts by comment count
    const top5 = [...igLiveData.media].sort((a,b)=>(b.comments_count||0)-(a.comments_count||0)).slice(0,5);
    labels = top5.map(m => {
      const cap = (m.caption||'').replace(/#[\w가-힣]+/g,'').trim();
      return cap.slice(0,10) || '게시물';
    });
    data = top5.map(m => m.comments_count || 0);
    isReal = true;
  } else {
    labels = ['한라산 일출','맛집 투어','카페 브이로그','패션 코디','운동 챌린지'];
    data   = [184, 142, 98, 215, 76];
  }

  new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '댓글 수',
        data,
        backgroundColor: data.map((_,i)=> ['rgba(99,102,241,.75)','rgba(59,110,248,.75)','rgba(16,185,129,.75)','rgba(245,158,11,.75)','rgba(236,72,153,.75)'][i%5]),

        x:{grid:{display:false},ticks:{font:{size:10},color:'#9ca3af',maxRotation:20}},

window.saveCompEdits = function(count) {
  const wrap = document.getElementById('compEditorRows');
  const n = wrap ? wrap.children.length : count;
  const result = [];
  for (let i=0; i<n; i++) {
    const name = document.getElementById(`cn_${i}`)?.value?.trim();
    const handle = document.getElementById(`ch_${i}`)?.value?.trim();
    if (!name && !handle) continue;
    result.push({
      name: name||handle||`경쟁사${i+1}`,
      handle: handle||'',
      followers: parseInt(document.getElementById(`cf_${i}`)?.value)||0,
      growth: parseFloat(document.getElementById(`cg_${i}`)?.value)||0,
      eng: parseFloat(document.getElementById(`ce_${i}`)?.value)||0,
      posts: parseInt(document.getElementById(`cp_${i}`)?.value)||0,
    });
  }
  saveCompetitors(result);
  closeModal();
  navigate('competitors');
  toast('경쟁사 데이터가 저장되었습니다','success');
};

function pgCompetitors() {
  const savedComps = loadCompetitors();
  const bgList  = ['#dbeafe','#dcfce7','#fef9c3','#fee2e2','#fff7ed','#f0fdf4','#fce7f3','#ede9fe'];
  const colList = ['#2563eb','#16a34a','#ca8a04','#dc2626','#ea580c','#16a34a','#be185d','#7c3aed'];

  // Real "내 계정" data
  const myFollowers = igLive('profile.followers_count', 48291);
  const myPosts     = igLive('profile.media_count', 142);
  const myEng       = igLiveData?.mediaEngRate != null ? parseFloat(igLiveData.mediaEngRate.toFixed(2)) : 6.12;
  const fh          = igLiveData?.insights?.follower_history || [];
  const myGrowth    = fh.length>1
    ? parseFloat(((fh.at(-1)?.value - fh[0]?.value)/(fh[0]?.value||1)*100).toFixed(1))
    : (igLiveData ? 0 : 12.3);
  const myHandle    = igLiveData ? '@'+igLiveData.profile.username : '@내계정';

  // Build unified list: my account + competitors, sorted by followers
  const me = { me:true, handle:myHandle, name:'내 계정', avatar:(igLiveData?.profile?.username||'나')[0].toUpperCase(), bg:'#ede9fe', col:'#6366f1', followers:myFollowers, growth:myGrowth, eng:myEng, posts:myPosts };
  const compList = savedComps.map((c,i) => ({
    me:false, handle:c.handle, name:c.name,
    avatar:(c.name||c.handle||'?')[0].toUpperCase(),
    bg:bgList[i%bgList.length], col:colList[i%colList.length],
    followers:c.followers, growth:c.growth, eng:c.eng, posts:c.posts,
  }));
  const allSorted = [me, ...compList].sort((a,b)=>b.followers-a.followers).map((c,i)=>({...c, rank:i+1}));
  const maxF = Math.max(...allSorted.map(c=>c.followers), 1);
  const myRank = allSorted.find(c=>c.me)?.rank || 1;

  // KPI: rank, growth rank, eng rank, vs avg
  const compOnlyGrowths = compList.map(c=>c.growth);
  const compOnlyEngs    = compList.map(c=>c.eng);
  const avgGrowth = compOnlyGrowths.length ? compOnlyGrowths.reduce((s,v)=>s+v,0)/compOnlyGrowths.length : 0;

function initCompRadarChart() {
  const el = document.getElementById('compRadarChart');
  if(!el) return;

  const comps   = loadCompetitors();
  const myEng   = igLiveData?.mediaEngRate != null ? parseFloat(igLiveData.mediaEngRate.toFixed(2)) : 6.12;
  const fh      = igLiveData?.insights?.follower_history || [];
  const myGrowth = fh.length>1 ? parseFloat(((fh.at(-1)?.value-fh[0]?.value)/(fh[0]?.value||1)*100).toFixed(1)) : 12.3;
  const myPosts  = igLive('profile.media_count', 142);
  const myReach  = igLiveData?.insights?.reach != null ? igLiveData.insights.reach : null;

  // Avg competitor values
  const avgGrowth = comps.length ? comps.reduce((s,c)=>s+c.growth,0)/comps.length : 6.3;
  const avgEng    = comps.length ? comps.reduce((s,c)=>s+c.eng,0)/comps.length    : 4.7;
  const avgPosts  = comps.length ? comps.reduce((s,c)=>s+c.posts,0)/comps.length  : 380;

  // Normalize to 0–100 scale relative to max across me+comps
  const maxGrowth = Math.max(myGrowth, ...comps.map(c=>c.growth), 1);
  const maxEng    = Math.max(myEng,    ...comps.map(c=>c.eng),    1);
  const maxPosts  = Math.max(myPosts,  ...comps.map(c=>c.posts),  1);

  const norm = (v, max) => Math.round(Math.min(v/max*100, 100));
  const myData  = [ norm(myGrowth, maxGrowth), norm(myEng, maxEng), norm(myPosts, maxPosts), myReach!=null?Math.min(Math.round(myReach/500),100):65, 70 ];
  const avgData = [ norm(avgGrowth,maxGrowth), norm(avgEng, maxEng), norm(avgPosts,maxPosts), 60, 55 ];

  new Chart(el.getContext('2d'), {
    type: 'radar',
    data: {
      labels: ['팔로워 성장률','인게이지먼트율','게시물 수','도달수','저장 수'],
      datasets: [
        { label:'내 계정', data:myData,  borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,.15)', borderWidth:2.5, pointBackgroundColor:'#6366f1', pointRadius:4 },
        { label:'경쟁사 평균', data:avgData, borderColor:'#94a3b8', backgroundColor:'rgba(148,163,184,.1)',  borderWidth:2,   pointBackgroundColor:'#94a3b8', pointRadius:4 },
      ]
    },
    options: {
      responsive:true,
      plugins:{ legend:{ position:'bottom', labels:{ font:{size:12}, padding:14 } } },
      scales:{ r:{ min:0, max:100, ticks:{ stepSize:25, font:{size:10} }, pointLabels:{ font:{size:12} } } }
    }
  });
}

function initCompFollowerChart() {
  const el = document.getElementById('compFollowerChart');

  const fh      = igLiveData?.insights?.follower_history || [];

function igGetAppId()  { return localStorage.getItem('ig_app_id') || ''; }

function igGetConn()   { try { return JSON.parse(localStorage.getItem('ig_connection')); } catch{ return null; } }

function igClearConn() { localStorage.removeItem('ig_connection'); localStorage.removeItem('ig_token'); }

function igStartOAuth() {
  // 서버 OAuth 흐름으로 이동 (api/auth/login.js)
  toast('Instagram 로그인 페이지로 이동합니다...', 'info');
  setTimeout(() => { window.location.href = '/api/auth/login'; }, 600);
}

function igHandleCallback() {
  // 1) 서버 OAuth 후 URL 해시로 토큰 전달: /dashboard#token=XXX
  const hash = window.location.hash;
  const hashMatch = hash.match(/[#&]token=([^&]+)/);
  if (hashMatch) {
    const token = decodeURIComponent(hashMatch[1]);
    history.replaceState(null, '', window.location.pathname);
    setTimeout(() => igConnectWithToken(token), 100);
    return;
  }

  // 2) 구형 클라이언트 측 OAuth 코드 처리 (fallback)
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  if (!code && !error) return;
  window.history.replaceState({}, '', window.location.pathname);
  if (error) { setTimeout(() => toast('Instagram 로그인이 취소되었습니다.', 'warn'), 500); return; }
  // 서버 OAuth로 재시도
  toast('서버를 통해 인증을 완료합니다...', 'info');
  setTimeout(() => { window.location.href = '/api/auth/login'; }, 800);
}

async function igConnectWithToken(token) {
  toast('계정 정보를 가져오는 중...', 'info');
  try {
    const fields = 'id,username,name,account_type,media_count,followers_count,biography,website,profile_picture_url';
    const res = await fetch(`https://graph.instagram.com/me?fields=${fields}&access_token=${token}`);
    const data = await res.json();
    if (data.error) {
      toast(`연결 실패: ${data.error.message}`, 'error');
      setTimeout(() => showTokenInput(), 800);
      return;
    }
    localStorage.setItem('ig_token', token);
    const now = new Date();
    const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
    const avatar = (data.name || data.username || '?')[0].toUpperCase();
    igSaveConn({
      demo: false,
      real: true,
      id: data.id,
      handle: '@' + data.username,
      name: data.name || data.username,
      type: data.account_type === 'BUSINESS' ? '비즈니스 계정' : data.account_type === 'CREATOR' ? '크리에이터 계정' : '개인 계정',
      since: dateStr,
      followers: data.followers_count || 0,
      posts: data.media_count || 0,
      bio: data.biography || '',
      website: data.website || '',
      avatar,
      connectedAt: now.toISOString(),
    });
    navigate('connect');
    if (data.account_type === 'PERSONAL') {
      setTimeout(() => {
        openModal(`
          <div class="modal-title">${ic('alert-triangle',16,'#f59e0b')} 개인 계정 감지</div>
          <div style="background:#fff7ed;border-radius:10px;padding:13px;margin-bottom:14px;font-size:13px;color:#92400e;line-height:1.75">
            연결된 계정 <strong>@${data.username}</strong>은 <strong>개인(PERSONAL) 계정</strong>입니다.<br><br>
            팔로워, 게시물은 정상 연동되지만 <strong>도달수·프로필 방문·인사이트</strong> 데이터는
            <strong>비즈니스 또는 크리에이터 계정에서만</strong> 사용 가능합니다.
          </div>
          <div style="font-size:13px;font-weight:700;margin-bottom:8px">계정 유형 전환 방법</div>
          <div style="font-size:12.5px;color:var(--muted);line-height:1.75;margin-bottom:16px">
            Instagram 앱 → 프로필 → 오른쪽 상단 <strong>≡</strong> → 설정 및 개인정보 →<br>
            계정 유형 및 도구 → <strong>비즈니스 계정으로 전환</strong>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn-ghost" style="flex:1;justify-content:center" onclick="closeModal()">지금은 넘기기</button>
            <button class="btn-primary" style="flex:1;justify-content:center" onclick="closeModal()">${ic('check',13)} 확인</button>
          </div>`);
      }, 600);
    } else {
      setTimeout(() => toast(`@${data.username} 계정이 연결되었습니다!`, 'success'), 200);
      // 비즈니스/크리에이터 계정은 자동으로 실시간 데이터 fetch
      setTimeout(async () => {
        toast('실시간 데이터를 불러오는 중...', 'info');
        const result = await igFetchAllData();
        if (result) {
          navigate('dashboard');
          const fc = result.profile?.followers_count;
          if (fc) toast(`팔로워 ${fc.toLocaleString()}명 · 실시간 데이터 연동 완료`, 'success');
        }
      }, 800);
    }
  } catch(e) {
    toast('연결 중 오류가 발생했습니다. 토큰을 확인하세요.', 'error');
    setTimeout(() => showTokenInput(), 800);
  }
}

async function igRefreshReal() {
  const token = localStorage.getItem('ig_token');
  if (!token) { toast('액세스 토큰이 없습니다.', 'warn'); return; }
  toast('실시간 데이터를 가져오는 중...', 'info');
  try {
    const fields = 'id,username,name,account_type,media_count,followers_count,biography,website';
    const res = await fetch(`https://graph.instagram.com/me?fields=${fields}&access_token=${token}`);
    const data = await res.json();
    if (data.error) { toast(`갱신 실패: ${data.error.message}`, 'error'); return; }
    const conn = igGetConn();
    igSaveConn({
      ...conn,
      followers: data.followers_count || conn.followers,
      posts: data.media_count || conn.posts,
      lastSync: new Date().toISOString(),
    });
    navigate('connect');
    setTimeout(() => toast('데이터가 업데이트되었습니다!', 'success'), 100);
  } catch(e) {
    toast('갱신 중 오류가 발생했습니다.', 'error');
  }
}

function initGrowthTrendChart() {
  const el = document.getElementById('growthTrendChart');
  if(!el) return;
  const fh = igLiveData?.insights?.follower_history || [];
  let actualLabels, actualData;
  if (fh.length > 1) {
    actualLabels = fh.map(v=>{ const d=new Date(v.end_time||Date.now()); return `${d.getMonth()+1}/${d.getDate()}`; });
    actualData   = fh.map(v=>v.value||0);
  } else {
    const fc = igLive('profile.followers_count', 48291);
    actualLabels = ['10월','11월','12월','1월','2월','3월'];
    actualData   = [38000,40200,42100,44600,46800,48291].map(v=>Math.round(fc*v/48291));
  }
  const last = actualData[actualData.length-1] || 0;
  const growthRate = actualData.length>1 ? (last - actualData[0]) / (actualData[0]||1) / actualData.length : 0.04;
  const predLabels = ['→','+1달','+2달','+3달'];
  const predData   = [last, Math.round(last*(1+growthRate)), Math.round(last*(1+growthRate)**2), Math.round(last*(1+growthRate)**3)];

function presetDate(label) {
  const today=new Date(), fmt=d=>d.toISOString().split('T')[0];
  let s=new Date(), e=new Date();
  if(label==='오늘'){s=e=today;}
  else if(label==='어제'){s.setDate(today.getDate()-1);e=new Date(s);}
  else if(label==='최근 7일'){s.setDate(today.getDate()-6);}
  else if(label==='최근 30일'){s.setDate(today.getDate()-29);}
  else if(label==='이번달'){s=new Date(today.getFullYear(),today.getMonth(),1);}
  else if(label==='지난달'){s=new Date(today.getFullYear(),today.getMonth()-1,1);e=new Date(today.getFullYear(),today.getMonth(),0);}
  const sd=document.getElementById('sd'); const ed=document.getElementById('ed');
  if(sd)sd.value=fmt(s); if(ed)ed.value=fmt(e);
}
function applyDate() {
  const s=document.getElementById('sd')?.value, e=document.getElementById('ed')?.value;
  if(s&&e){closeModal();toast(`기간 설정: ${s} ~ ${e}`,'success');}
}

function selWidget(el,name) { document.querySelectorAll('.widget-opt').forEach(w=>w.classList.remove('sel')); el.classList.add('sel'); }
function addWidget() {
  const sel=document.querySelector('.widget-opt.sel');
  if(!sel){toast('위젯을 먼저 선택해주세요','warn');return;}
  closeModal(); toast(`"${sel.querySelector('.wo-name').textContent}" 위젯 추가 완료!`,'success');
}

function exportCSV() {
  const rows=[['ID','게시물','좋아요','도달수','댓글','저장','평점'],...posts.map(p=>[p.id,p.name,p.likes,p.reach,p.comments,p.saves,p.rating])];
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'})),download:'instagram_analytics.csv'});
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSV 파일 다운로드 완료!','success');
}

function expandAI() {
  openModal(`

      <div class="ai-msg">목요일 오후 7-9시 게시 시 인게이지먼트가 평균 <strong>34% 높습니다.</strong></div>
    </div>
    <div class="ai-row">
      <input class="ai-input" id="aiInputExp" placeholder="인사이트를 물어보세요..."/>
      <button class="ai-send" id="aiSendExp">${ic('send',13,'#fff')}</button>
    </div>`, true);
  ri();
  const sendExp=()=>{
    const inp=document.getElementById('aiInputExp'), msgs=document.getElementById('aiMsgsExp');
    if(!inp||!msgs||!inp.value.trim()) return;
    const u=document.createElement('div'); u.className='ai-msg user'; u.textContent=inp.value; msgs.appendChild(u);
    inp.value='';
    const t=document.createElement('div'); t.className='ai-msg'; t.innerHTML='<div class="ai-typing"><span></span><span></span><span></span></div>'; msgs.appendChild(t); msgs.scrollTop=msgs.scrollHeight;
    setTimeout(()=>{ t.textContent=aiLines[aiIdx%aiLines.length]; aiIdx++; msgs.scrollTop=msgs.scrollHeight; },700);
  };
  setTimeout(()=>{
    const b=document.getElementById('aiSendExp'); if(b) b.onclick=sendExp;
    const i=document.getElementById('aiInputExp'); if(i) i.addEventListener('keydown',e=>{if(e.key==='Enter')sendExp();});
  },50);
}

});

document.getElementById('searchInput').addEventListener('input', e=>{
  const q=e.target.value.trim().toLowerCase();
  if(q.length<2) return;
  const found=posts.filter(p=>p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q));
  if(found.length) toast(`"${q}" 검색 결과: ${found.length}개 게시물`,'info');
});

document.querySelectorAll('.nav-item[data-page]').forEach(el=>{ el.onclick=()=>navigate(el.dataset.page); });

function openMoreDrawer(){
  document.getElementById('moreDrawerBg').classList.add('open');
  document.getElementById('moreDrawer').classList.add('open');
  document.body.style.overflow='hidden';
  // 현재 페이지 active 표시
  document.querySelectorAll('.more-drawer-item[data-mdpage]').forEach(el=>{
    el.classList.toggle('active', el.dataset.mdpage===curPage);
  });
}
function closeMoreDrawer(){
  document.getElementById('moreDrawerBg').classList.remove('open');
  document.getElementById('moreDrawer').classList.remove('open');
  document.body.style.overflow='';
}
function drawerNav(page){
  closeMoreDrawer();
  setTimeout(()=>navigate(page),200);
}

igHandleCallback();

// Auto-fetch live data if real account is connected
(async () => {
  const conn = igGetConn();
  if (conn?.real && localStorage.getItem('ig_token')) {
    navigate('dashboard');
    // Fetch in background then re-render
    const result = await igFetchAllData();
    if (result) {
      navigate(curPage);
      const fc = result.profile?.followers_count;
      if (fc) toast(`${conn.handle} · 팔로워 ${fc.toLocaleString()}명 · 실시간 데이터 연동됨`, 'success');
    }
  } else {
    navigate('dashboard');
  }
})();

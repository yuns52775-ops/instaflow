<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AdPulse - Meta Ads</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root{
      --bg:#f0f2f8;--card:#fff;--border:#e8ecf3;
      --text:#111827;--muted:#6b7280;--faint:#9ca3af;
      --sidebar:#fff;--topbar:#fff;--input-bg:#f5f7fc;
      --row-hover:#f9fafb;--shadow:0 4px 24px rgba(0,0,0,.07);
      --shadow-sm:0 1px 4px rgba(0,0,0,.06);--radius:14px;--radius-sm:10px;
      --brand:#1877f2;--brand-dark:#0d65d9;--brand-light:#e7f0fe;
    }
    body.dark{
      --bg:#0d1117;--card:#161b22;--border:#21262d;
      --text:#e6edf3;--muted:#8b949e;--faint:#484f58;
      --sidebar:#161b22;--topbar:#161b22;--input-bg:#0d1117;
      --row-hover:#1c2128;--shadow:0 4px 24px rgba(0,0,0,.4);
      --brand-light:#1c2a4a;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;transition:background .25s,color .25s;}

    /* ── Sidebar ── */
    .sidebar{width:230px;min-height:100vh;background:var(--sidebar);display:flex;flex-direction:column;border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:100;transition:background .25s;}
    .sidebar-logo{display:flex;align-items:center;gap:10px;padding:22px 18px 16px;}
    .logo-box{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1877f2,#0d65d9);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-text{font-size:16px;font-weight:800;letter-spacing:-.4px;}
    .logo-sub{font-size:10px;color:var(--faint);margin-top:1px;}
    .back-btn{display:flex;align-items:center;gap:7px;margin:0 12px 12px;padding:8px 10px;border-radius:9px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .18s;border:1px solid var(--border);background:var(--card);}
    .back-btn:hover{color:var(--text);background:var(--input-bg);}
    .sidebar nav{flex:1;padding:0 10px;overflow-y:auto;}
    .nav-label{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.8px;padding:14px 10px 5px;text-transform:uppercase;}
    .nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13.5px;color:var(--muted);margin-bottom:1px;transition:all .18s;user-select:none;}
    .nav-item:hover{background:var(--input-bg);color:var(--text);}
    .nav-item.active{background:var(--brand-light);color:var(--brand);font-weight:600;}
    body.dark .nav-item.active{background:#1c2a4a;color:#5b9af8;}
    .nav-badge{margin-left:auto;background:#ef4444;color:#fff;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:20px;line-height:1.5;}
    .nav-badge.blue{background:var(--brand);}
    .sidebar-footer{padding:12px 14px 16px;}
    .account-box{background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:13px;}
    .account-box .acc-name{font-size:13px;font-weight:700;}
    .account-box .acc-id{font-size:11.5px;color:var(--muted);margin-top:2px;}
    .acc-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:#10b981;margin-top:6px;}
    .acc-dot{width:6px;height:6px;border-radius:50%;background:#10b981;}

    /* ── Main ── */
    .main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh;}

    /* ── Topbar ── */
    .topbar{display:flex;align-items:center;gap:12px;padding:13px 26px;background:var(--topbar);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;transition:background .25s;}
    .search-box{display:flex;align-items:center;gap:8px;background:var(--input-bg);border-radius:9px;padding:7px 13px;flex:1;max-width:320px;border:1px solid var(--border);transition:border-color .2s;}
    .search-box:focus-within{border-color:var(--brand);}
    .search-box input{border:none;background:transparent;font-size:13px;outline:none;width:100%;color:var(--text);}
    .search-box input::placeholder{color:var(--faint);}
    .topbar-center{flex:1;display:flex;justify-content:center;align-items:center;gap:6px;}
    .top-tab{padding:6px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .18s;}
    .top-tab.on{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(24,119,242,.35);}
    .topbar-right{display:flex;align-items:center;gap:8px;}
    .icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--card);color:var(--muted);transition:all .18s;position:relative;}
    .icon-btn:hover{background:var(--input-bg);color:var(--text);}
    .avatar{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1877f2,#0d65d9);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;cursor:pointer;}
    .notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid var(--card);}

    /* ── Content ── */
    .content{padding:24px 26px;flex:1;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
    .page-header h1{font-size:clamp(15px,1.6vw,20px);font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:8px;}
    .page-header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .date-btn{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 13px;background:var(--card);font-size:13px;color:var(--muted);cursor:pointer;transition:border-color .2s;white-space:nowrap;}
    .date-btn:hover{border-color:var(--brand);}
    .btn-ghost{border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 13px;background:var(--card);font-size:13px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:6px;transition:all .2s;}
    .btn-ghost:hover{border-color:var(--brand);color:var(--brand);}
    .btn-primary{border:none;border-radius:var(--radius-sm);padding:7px 16px;background:var(--brand);color:#fff;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(24,119,242,.3);transition:background .2s;}
    .btn-primary:hover{background:var(--brand-dark);}

    /* ── Cards ── */
    .card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);transition:background .25s,border-color .25s;}
    .card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
    .card-title{font-size:clamp(12.5px,1.2vw,14.5px);font-weight:700;letter-spacing:-.2px;}
    .card-menu{color:var(--faint);cursor:pointer;padding:4px;border-radius:6px;transition:background .15s;display:flex;align-items:center;}
    .card-menu:hover{background:var(--input-bg);}

    /* ── KPI ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:14px;}
    .kpi-card{background:var(--card);border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border);cursor:pointer;transition:box-shadow .2s,transform .2s;position:relative;overflow:hidden;}
    .kpi-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
    .kpi-card.blue::before{background:var(--brand);}
    .kpi-card.green::before{background:#10b981;}
    .kpi-card.purple::before{background:#7c3aed;}
    .kpi-card.yellow::before{background:#f59e0b;}
    .kpi-card.red::before{background:#ef4444;}
    .kpi-card.pink::before{background:#ec4899;}
    .kpi-card.teal::before{background:#0891b2;}
    .kpi-card.indigo::before{background:#6366f1;}
    .kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:6px;}
    .kpi-label{font-size:12px;color:var(--muted);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .kpi-icon-box{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .kpi-value{font-size:clamp(14px,1.6vw,22px);font-weight:700;letter-spacing:-.5px;margin-bottom:5px;line-height:1.3;display:flex;flex-wrap:wrap;align-items:baseline;gap:5px;}
    .kpi-meta{font-size:11.5px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tag-up{color:#10b981;background:#ecfdf5;padding:2px 6px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;}
    .tag-dn{color:#ef4444;background:#fef2f2;padding:2px 6px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;}

    /* ── Table ── */
    .data-table{width:100%;border-collapse:collapse;font-size:13px;}
    .data-table th{color:var(--faint);font-weight:500;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
    .data-table td{padding:11px 12px;border-bottom:1px solid var(--bg);color:var(--text);vertical-align:middle;}
    .data-table tbody tr{cursor:pointer;transition:background .13s;}
    .data-table tbody tr:hover{background:var(--row-hover);}
    .data-table tr:last-child td{border-bottom:none;}

    /* ── Status Pills ── */
    .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;}
    .pill-active{background:#dcfce7;color:#16a34a;}
    .pill-pause{background:#fef9c3;color:#ca8a04;}
    .pill-end{background:var(--input-bg);color:var(--faint);}
    .pill-learn{background:#ede9fe;color:#7c3aed;}
    body.dark .pill-active{background:#052e16;}
    body.dark .pill-pause{background:#422006;}
    .pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}

    /* ── Period Tabs ── */
    .period-tabs{display:flex;gap:2px;background:var(--input-bg);border-radius:8px;padding:3px;}
    .ptab{padding:3px 10px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--faint);transition:all .18s;}
    .ptab.active{background:var(--card);color:var(--brand);box-shadow:var(--shadow-sm);}

    /* ── Dropdown ── */
    .dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);min-width:200px;z-index:300;overflow:hidden;animation:popIn .15s ease;}
    @keyframes popIn{from{opacity:0;transform:translateY(-6px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
    .dd-item{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:13px;color:var(--text);cursor:pointer;transition:background .13s;}
    .dd-item:hover{background:var(--input-bg);}
    .dd-item.red{color:#ef4444;}
    .dd-sep{height:1px;background:var(--border);margin:3px 0;}
    .dd-hd{padding:10px 14px 5px;font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;}

    /* ── Modal ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(2px);}
    .modal-overlay.open{display:flex;}
    .modal-box{background:var(--card);border-radius:18px;padding:26px;max-width:520px;width:90%;max-height:86vh;overflow-y:auto;position:relative;animation:modalIn .2s ease;box-shadow:0 24px 60px rgba(0,0,0,.2);border:1px solid var(--border);}
    .modal-box.wide{max-width:700px;}
    @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
    .modal-close{position:absolute;top:16px;right:16px;background:var(--input-bg);border:none;width:28px;height:28px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background .15s;}
    .modal-close:hover{background:var(--border);}
    .modal-title{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px;}

    /* ── Toast ── */
    .toast-container{position:fixed;bottom:22px;right:22px;z-index:2000;display:flex;flex-direction:column;gap:7px;}
    .toast{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 16px;font-size:13px;color:var(--text);box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;animation:slideIn .25s ease;min-width:230px;}
    @keyframes slideIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
    .toast.success{border-left:3px solid #10b981;}
    .toast.info{border-left:3px solid var(--brand);}
    .toast.warn{border-left:3px solid #f59e0b;}

    /* ── Form ── */
    .form-group{margin-bottom:13px;}
    .form-group label{display:block;font-size:11.5px;font-weight:600;color:var(--faint);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
    .form-input{width:100%;border:1px solid var(--border);background:var(--input-bg);color:var(--text);border-radius:9px;padding:9px 13px;font-size:13.5px;outline:none;transition:border-color .18s;}
    .form-input:focus{border-color:var(--brand);}
    .form-row{display:flex;gap:12px;}
    .form-row .form-group{flex:1;}

    /* ── Misc ── */
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
    .stat-big{font-size:clamp(18px,2vw,26px);font-weight:700;letter-spacing:-.5px;}
    .stat-lbl{font-size:12px;color:var(--muted);margin-top:4px;}
    .budget-track{height:6px;background:var(--input-bg);border-radius:4px;overflow:hidden;margin-top:5px;}
    .budget-fill{height:6px;border-radius:4px;}
    .roas-bar-bg{height:5px;background:var(--input-bg);border-radius:3px;margin-top:4px;}
    .roas-bar-fill{height:5px;border-radius:3px;}
    .creative-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .2s;}
    .creative-card:hover{box-shadow:var(--shadow);}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:600;}
    .audience-card{border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;}
    .audience-card:hover{border-color:var(--brand);background:var(--brand-light);}
    .section-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0;}
    .stab{padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .18s;}
    .stab.on{color:var(--brand);border-bottom-color:var(--brand);}
    .inline-alert{background:var(--brand-light);border:1px solid #bdd5fd;border-radius:10px;padding:12px 14px;font-size:13px;color:#1e4eb8;display:flex;align-items:flex-start;gap:8px;margin-bottom:14px;}
    body.dark .inline-alert{color:#93c5fd;border-color:#1c2a4a;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

    /* ── Overflow prevention ── */
    html{overflow-x:hidden;}
    body{overflow-x:hidden;}
    .kpi-grid>*,.mid-row>*,.bot-row>*,.creative-grid>*,.form-row>*{min-width:0;}
    .card{overflow:hidden;}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    canvas{max-width:100%;}

    /* ── Hamburger ── */
    .hamburger{display:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--border);align-items:center;justify-content:center;cursor:pointer;background:var(--card);color:var(--muted);flex-shrink:0;}
    .hamburger:hover{background:var(--input-bg);}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;backdrop-filter:blur(1px);}
    .sidebar-overlay.show{display:block;}

    /* ── Responsive ── */
    @media (max-width:1400px){
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
    }
    @media (max-width:1200px){
      .mid-row,.bot-row{grid-template-columns:1fr;}
      .topbar-center{gap:3px;}
      .search-box{max-width:180px;}
    }
    @media (max-width:1050px){
      .topbar-center{display:none;}
    }
    @media (max-width:900px){
      .sidebar{transform:translateX(-230px);transition:background .25s,transform .25s;}
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.18);}
      .main{margin-left:0;}
      .hamburger{display:flex;}
      .content{padding:16px 14px;}
      .topbar{padding:11px 14px;gap:8px;}
      .search-box{max-width:100%;flex:1;}
      .kbd{display:none;}
    }
    @media (max-width:640px){
      .kpi-grid{grid-template-columns:1fr;}
      .page-header{flex-direction:column;align-items:flex-start;}
      .page-header-right{width:100%;flex-wrap:wrap;}
      .form-row{flex-direction:column;}
      .creative-grid{grid-template-columns:repeat(2,1fr);}
      .topbar-right .icon-btn:not(#themeBtn){display:none;}
    }
  </style>
</head>

    <div class="nav-item" data-page="reports"><i data-lucide="file-text" style="width:15px;height:15px"></i> 리포트</div>
    <div class="nav-label">설정</div>
    <div class="nav-item" data-page="billing"><i data-lucide="credit-card" style="width:15px;height:15px"></i> 결제 & 예산</div>
    <div class="nav-item" data-page="settings"><i data-lucide="settings" style="width:15px;height:15px"></i> 설정</div>
    <div class="nav-label">광고 집행</div>

// ══ REAL META ADS API ══════════════════════════════════════════════════════
const META_GRAPH = 'https://graph.facebook.com/v21.0';

function getMetaToken(){ return localStorage.getItem('meta_ads_token')||''; }
function getMetaAccountId(){ return localStorage.getItem('meta_ads_account_id')||''; }

let realKpis = null; // populated after successful API call

function metaGetAction(arr, type){
  if(!arr) return 0;
  const a = arr.find(x=>x.action_type===type||x.action_type===('offsite_conversion.fb_pixel_'+type)||x.action_type===('omni_'+type));
  return a ? parseFloat(a.value)||0 : 0;
}

function metaProcessInsights(data){
  if(!data||!data.data||!data.data.length) return null;
  const d = data.data[0];
  const spend = parseFloat(d.spend)||0;
  const clicks = parseInt(d.clicks)||0;
  const conv = metaGetAction(d.actions,'purchase')||metaGetAction(d.actions,'complete_registration')||0;
  const convVal = metaGetAction(d.action_values,'purchase')||0;
  return {
    spend, clicks,
    impressions: parseInt(d.impressions)||0,
    reach: parseInt(d.reach)||0,
    ctr: parseFloat(d.ctr)||0,
    cpc: parseFloat(d.cpc)||0,
    cpm: parseFloat(d.cpm)||0,
    conv, convVal,
    roas: spend>0 ? convVal/spend : 0,
    cvr: clicks>0 ? conv/clicks*100 : 0,
  };
}

function metaProcessCampaigns(data){
  if(!data||!data.data) return [];
  const sm = {ACTIVE:'active',PAUSED:'pause',ARCHIVED:'end',DELETED:'end',CAMPAIGN_PAUSED:'pause',IN_PROCESS:'learn'};
  return data.data.map(c=>{
    const ins = c.insights?.data?.[0];
    const spend = parseFloat(ins?.spend)||0;
    const conv = ins ? (metaGetAction(ins.actions,'purchase')||metaGetAction(ins.actions,'complete_registration')||0) : 0;
    const convVal = ins ? (metaGetAction(ins.action_values,'purchase')||0) : 0;
    return {
      id:c.id, name:c.name,
      obj:(c.objective||'—').replace(/_/g,' '),
      status:sm[c.status]||'end',
      budget:parseInt(c.daily_budget||c.lifetime_budget||0)/100,
      spend, reach:parseInt(ins?.reach)||0, imp:parseInt(ins?.impressions)||0,
      ctr:parseFloat(ins?.ctr)||0, roas:spend>0?convVal/spend:0,
      conv, cpc:parseFloat(ins?.cpc)||0, cpm:parseFloat(ins?.cpm)||0,
      cpa:conv>0?spend/conv:0, freq:0,
      startDate:c.start_time?.slice(0,10)||'—', endDate:c.stop_time?.slice(0,10)||'—',
    };
  });
}

async function metaFetch(path, token){
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(`${META_GRAPH}${path}${sep}access_token=${token}`);
  return res.json();
}

let realCreatives = null;
let realPixelData = null;
let realInsightsTrend = null;
let realInsightsPlatform = null;

function metaProcessAds(data){
  if(!data||!data.data) return [];
  const sm = {ACTIVE:'active',PAUSED:'pause',ARCHIVED:'end',DELETED:'end',CAMPAIGN_PAUSED:'pause'};
  const bgList=['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#f7971e,#ffd200)','linear-gradient(135deg,#11998e,#38ef7d)','linear-gradient(135deg,#ee0979,#ff6a00)','linear-gradient(135deg,#0082c8,#667eea)'];
  return data.data.map((a,i)=>{
    const ins = a.insights?.data?.[0];
    const spend = parseFloat(ins?.spend)||0;
    const conv = ins ? (metaGetAction(ins.actions,'purchase')||metaGetAction(ins.actions,'complete_registration')||0) : 0;
    const convVal = ins ? (metaGetAction(ins.action_values,'purchase')||0) : 0;
    const objType = a.creative?.object_type||'';
    const typeMap = {VIDEO:'동영상',SHARE:'카루셀',PHOTO:'이미지',LINK:'링크',STATUS:'텍스트'};
    const type = typeMap[objType]||'이미지';
    const iconMap = {동영상:'video',카루셀:'layers',이미지:'image',링크:'link',텍스트:'type'};
    return {
      id:a.id, name:a.name,
      type, icon:iconMap[type]||'image',
      camp:a.campaign_id||'—',
      thumbnail:a.creative?.thumbnail_url||null,
      bg:bgList[i%bgList.length],
      status:sm[a.status]||'end',
      spend, imp:parseInt(ins?.impressions)||0,
      reach:parseInt(ins?.reach)||0,
      ctr:parseFloat(ins?.ctr)||0,
      cpc:parseFloat(ins?.cpc)||0,
      conv, convVal,
      roas:spend>0?convVal/spend:0,
    };
  });
}

function metaProcessAdsets(data){
  if(!data||!data.data) return [];
  const sm = {ACTIVE:'active',PAUSED:'pause',ARCHIVED:'end',DELETED:'end',CAMPAIGN_PAUSED:'pause'};
  return data.data.map(a=>{
    const ins = a.insights?.data?.[0];
    const spend = parseFloat(ins?.spend)||0;
    const conv = ins ? (metaGetAction(ins.actions,'purchase')||metaGetAction(ins.actions,'complete_registration')||0) : 0;
    const convVal = ins ? (metaGetAction(ins.action_values,'purchase')||0) : 0;
    // targeting summary
    let targetDesc = '—';
    if(a.targeting){
      const t = a.targeting;
      const parts = [];
      if(t.age_min||t.age_max) parts.push(`${t.age_min||''}~${t.age_max||''}세`);
      if(t.genders) parts.push(t.genders.includes(1)&&t.genders.includes(2)?'전체':t.genders.includes(1)?'남성':'여성');
      if(t.geo_locations?.countries?.length) parts.push(t.geo_locations.countries.join(','));
      if(t.interests?.length) parts.push(t.interests[0].name);
      targetDesc = parts.join(' · ')||'광범위';
    }
    return {
      id:a.id, name:a.name,
      camp:a.campaign_id||'—',
      target:targetDesc,
      status:sm[a.status]||'end',
      budget:parseInt(a.daily_budget||a.lifetime_budget||0)/100,
      spend, reach:parseInt(ins?.reach)||0,
      ctr:parseFloat(ins?.ctr)||0,
      roas:spend>0?convVal/spend:0,
      conv, cpc:parseFloat(ins?.cpc)||0,
    };
  });
}

async function loadRealAdsData(){
  const token = getMetaToken();
  const accountId = getMetaAccountId();
  if(!token||!accountId) return false;
  try {
    toast('Meta Ads 실시간 데이터 로딩 중...','info');
    const insFields = 'spend,impressions,reach,clicks,ctr,cpc,cpm,actions,action_values';
    const campFields = `id,name,status,objective,daily_budget,lifetime_budget,start_time,stop_time,insights.date_preset(last_30d){${insFields}}`;
    const adsetFields = `id,name,campaign_id,status,targeting,daily_budget,lifetime_budget,insights.date_preset(last_30d){spend,reach,clicks,ctr,cpc,actions,action_values}`;
    const adsFields = `id,name,status,campaign_id,creative{id,thumbnail_url,object_type},insights.date_preset(last_30d){spend,impressions,reach,clicks,ctr,cpc,actions,action_values}`;
    const pixelFields = `id,name,creation_time,last_fired_time`;
    const now = Math.floor(Date.now()/1000);
    const weekAgo = now - 7*86400;
    const trendFields = `spend,impressions,clicks,ctr,cpc,actions,action_values`;
    const [insData, campData, adsetData, adsData, pixelListData, trendData, platformData, demoData, attrData] = await Promise.all([
      metaFetch(`/${accountId}/insights?fields=${insFields}&date_preset=last_30d`, token),
      metaFetch(`/${accountId}/campaigns?fields=${encodeURIComponent(campFields)}&limit=50`, token),
      metaFetch(`/${accountId}/adsets?fields=${encodeURIComponent(adsetFields)}&limit=100`, token),
      metaFetch(`/${accountId}/ads?fields=${encodeURIComponent(adsFields)}&limit=100`, token),
      metaFetch(`/${accountId}/adspixels?fields=${pixelFields}&limit=5`, token),
      metaFetch(`/${accountId}/insights?fields=${trendFields}&date_preset=last_30d&time_increment=1&limit=31`, token),
      metaFetch(`/${accountId}/insights?fields=${trendFields}&date_preset=last_30d&breakdowns=publisher_platform`, token),
      metaFetch(`/${accountId}/insights?fields=spend,impressions,clicks,ctr&date_preset=last_30d&breakdowns=age,gender`, token),
      metaFetch(`/${accountId}/insights?fields=spend,actions,action_values&date_preset=last_30d&action_attribution_windows=${encodeURIComponent('["1d_click","7d_click","28d_click","1d_view"]')}`, token),
    ]);
    if(insData.error){
      const code = insData.error.code;
      if(code===190||code===102){
        localStorage.removeItem('meta_ads_token');
        toast('토큰이 만료됐습니다. 재연결해주세요','warn');
        setTimeout(()=>showMetaConnect(),400);
        return false;
      }
      throw new Error(insData.error.message);
    }
    realKpis = metaProcessInsights(insData);
    const realCamps = metaProcessCampaigns(campData);
    if(realCamps.length>0){ campaigns.length=0; campaigns.push(...realCamps); }
    // campaign_id → name 매핑
    const campMap = {};
    campaigns.forEach(c=>{ campMap[c.id]=c.name; });

    const realAdsetsArr = metaProcessAdsets(adsetData);
    if(realAdsetsArr.length>0){
      realAdsets = realAdsetsArr;
      realAdsets.forEach(a=>{ if(campMap[a.camp]) a.camp=campMap[a.camp]; });
    }
    const realAdsArr = metaProcessAds(adsData);
    if(realAdsArr.length>0){
      realCreatives = realAdsArr;
      realCreatives.forEach(a=>{ if(campMap[a.camp]) a.camp=campMap[a.camp]; });
    }
    // 픽셀 데이터 처리
    const pixels = pixelListData?.data||[];
    if(pixels.length>0){
      // 첫 번째 픽셀의 이벤트 통계 가져오기
      const firstPixel = pixels[0];
      try {
        const statsData = await metaFetch(`/${firstPixel.id}/stats?aggregation=event_name&start_time=${weekAgo}&end_time=${now}`, token);
        const events = (statsData?.data||[]).map(e=>({
          name: e.event_name,
          count: e.count||0,
          lastFired: firstPixel.last_fired_time||null,
        }));
        realPixelData = {
          id: firstPixel.id,
          name: firstPixel.name||'Meta Pixel',
          lastFired: firstPixel.last_fired_time||null,
          totalEvents: events.reduce((s,e)=>s+e.count,0),
          events,
        };
      } catch(e){ /* 픽셀 stats 실패 시 기본 정보만 저장 */
        realPixelData = { id:firstPixel.id, name:firstPixel.name||'Meta Pixel', lastFired:firstPixel.last_fired_time||null, totalEvents:0, events:[] };
      }
    }
    const accName = localStorage.getItem('meta_ads_account_name')||accountId;
    document.querySelector('.acc-name').textContent = accName;
    document.querySelector('.acc-id').textContent = '광고 계정 ' + accountId.replace('act_','#');
    const connectBtn = document.getElementById('metaConnectBtn');
    if(connectBtn) connectBtn.textContent = '재연결';
    // 일별 트렌드 데이터 처리
    if(trendData?.data?.length>0){
      const days = trendData.data;
      realInsightsTrend = {
        labels: days.map(d=>d.date_start.slice(5).replace('-','/')),
        spendVals: days.map(d=>parseFloat(d.spend)||0),
        convVals: days.map(d=>metaGetAction(d.actions,'purchase')||metaGetAction(d.actions,'complete_registration')||0),
        roasVals: days.map(d=>{ const s=parseFloat(d.spend)||0; const v=metaGetAction(d.action_values,'purchase')||0; return s>0?+(v/s).toFixed(2):0; }),
        ctrVals: days.map(d=>parseFloat(d.ctr)||0),
      };
      // 글로벌 차트 변수도 업데이트
      spendLabels.length=0; spendLabels.push(...realInsightsTrend.labels);
      spendVals.length=0; spendVals.push(...realInsightsTrend.spendVals);
      roasVals.length=0; roasVals.push(...realInsightsTrend.roasVals);
    }
    // 플랫폼별 데이터 처리
    if(platformData?.data?.length>0){
      realInsightsPlatform = platformData.data.map(d=>{
        const spend=parseFloat(d.spend)||0;
        const conv=metaGetAction(d.actions,'purchase')||metaGetAction(d.actions,'complete_registration')||0;
        const convVal=metaGetAction(d.action_values,'purchase')||0;
        return {platform:d.publisher_platform||'—',spend,impressions:parseInt(d.impressions)||0,clicks:parseInt(d.clicks)||0,ctr:parseFloat(d.ctr)||0,roas:spend>0?+(convVal/spend).toFixed(2):0,conv};
      }).sort((a,b)=>b.roas-a.roas);
    }
    // 연령/성별 데이터 처리
    if(demoData?.data?.length>0){
      realInsightsDemographics = demoData.data.map(d=>({
        age:d.age||'—', gender:d.gender||'—',
        impressions:parseInt(d.impressions)||0,
        clicks:parseInt(d.clicks)||0,
        ctr:parseFloat(d.ctr)||0,
        spend:parseFloat(d.spend)||0,
      }));
    }

    // 기여 윈도우 데이터
    if(attrData?.data?.length>0){
      const d = attrData.data[0];
      const getConv=(actions,window)=>{
        if(!actions) return 0;
        const a=actions.find(x=>(x.action_type==='purchase'||x.action_type==='offsite_conversion.fb_pixel_purchase')&&x[window]!==undefined);
        return a?parseFloat(a[window]||a.value)||0:metaGetAction(actions,'purchase');
      };
      const getVal=(avs,window)=>{
        if(!avs) return 0;
        const a=avs.find(x=>(x.action_type==='purchase'||x.action_type==='offsite_conversion.fb_pixel_purchase')&&x[window]!==undefined);
        return a?parseFloat(a[window]||a.value)||0:metaGetAction(avs,'purchase');
      };
      const spend=parseFloat(d.spend)||0;
      realAttributionWindows={
        spend,
        windows:[
          {label:'1일 클릭', conv:getConv(d.actions,'1d_click'), val:getVal(d.action_values,'1d_click')},
          {label:'7일 클릭', conv:getConv(d.actions,'7d_click'), val:getVal(d.action_values,'7d_click')},
          {label:'28일 클릭',conv:getConv(d.actions,'28d_click'),val:getVal(d.action_values,'28d_click')},
          {label:'1일 뷰',   conv:getConv(d.actions,'1d_view'),  val:getVal(d.action_values,'1d_view')},
        ],
      };
    }

    toast(`실시간 데이터 로드 완료 · 캠페인 ${realCamps.length}개 · 광고세트 ${realAdsetsArr.length}개 · 소재 ${realAdsArr.length}개${realPixelData?' · 픽셀 연동':''}`,'success');
    return true;
  } catch(e){
    toast('데이터 로드 실패: '+e.message,'warn');
    return false;
  }
}

window.metaLoadAccounts = async function(preselect=''){
  const token = (document.getElementById('mcToken')?.value||'').trim();
  if(!token){ toast('토큰을 입력하세요','warn'); return; }
  const sel = document.getElementById('mcAccSelect');
  if(sel) sel.innerHTML = '<option>불러오는 중...</option>';
  document.getElementById('mcAccSection').style.display='';
  try {
    const data = await metaFetch('/me/adaccounts?fields=id,name,currency,account_status,amount_spent', token);
    if(data.error){ toast('토큰 오류: '+data.error.message,'warn'); return; }
    const accounts = (data.data||[]).filter(a=>a.account_status===1||a.account_status===2);
    if(!accounts.length){ toast('활성 광고 계정이 없습니다','warn'); return; }
    sel.innerHTML = accounts.map(a=>`<option value="${a.id}" data-name="${a.name}">${a.name} (${a.id})</option>`).join('');
    if(preselect) { const opt=[...sel.options].find(o=>o.value===preselect); if(opt) sel.value=preselect; }
    document.getElementById('mcSaveRow').style.display='';
    toast(`광고 계정 ${accounts.length}개 발견`,'success');
  } catch(e){ toast('네트워크 오류: '+e.message,'warn'); }
};

window.metaSaveConnect = async function(){
  const token = (document.getElementById('mcToken')?.value||'').trim();
  const sel = document.getElementById('mcAccSelect');
  const accountId = sel?.value||'';
  const accountName = sel?.options[sel.selectedIndex]?.dataset.name||accountId;
  if(!token||!accountId){ toast('계정을 선택해주세요','warn'); return; }
  localStorage.setItem('meta_ads_token', token);
  localStorage.setItem('meta_ads_account_id', accountId);
  localStorage.setItem('meta_ads_account_name', accountName);
  closeModal();
  await loadRealAdsData();
  navigate('overview');
};

function getAdLibToken() {
  // Ad Library requires a Facebook Graph API token, NOT the Instagram token
  return localStorage.getItem('meta_ads_token') || '';
}

async function adLibSearch() {
  const input   = document.getElementById('adLibInput');
  const country = document.getElementById('adLibCountry');
  const query   = (input?.value || '').trim();
  if (!query) { toast('검색어를 입력하세요', 'warn'); return; }

  adLibQuery   = query;
  adLibCountry = country?.value || 'KR';

  const token = getAdLibToken();
  if (!token) { showAdLibTokenGuide(); return; }

  const resultsEl = document.getElementById('adLibResults');
  if (!resultsEl) return;
  resultsEl.innerHTML = `<div style="text-align:center;padding:60px;color:var(--muted)">
    <div style="width:40px;height:40px;border:3px solid var(--brand);border-top-color:transparent;border-radius:50%;margin:0 auto 16px;animation:spin 0.8s linear infinite"></div>
    <div style="font-size:14px;font-weight:600">"${query}" 광고 검색 중...</div>
    <div style="font-size:12px;margin-top:4px">Meta 광고 라이브러리에서 불러오는 중</div>
  </div>`;

  try {
    const fields = 'id,ad_creation_time,ad_delivery_start_time,ad_creative_bodies,ad_creative_link_titles,page_name,ad_snapshot_url,status,publisher_platforms,impressions,spend';
    const countriesParam = adLibCountry === 'ALL' ? '["KR","US","JP"]' : `["${adLibCountry}"]`;
    const url = `https://graph.facebook.com/v21.0/ads_archive?search_terms=${encodeURIComponent(query)}&ad_type=ALL&ad_reached_countries=${encodeURIComponent(countriesParam)}&fields=${fields}&limit=30&access_token=${token}`;

    const res  = await fetch(url);
    const data = await res.json();

    if (data.error) {
      const code = data.error.code;
      const msg  = data.error.message || '';
      const isTokenError   = code === 190 || msg.toLowerCase().includes('parse') || msg.toLowerCase().includes('invalid') || msg.toLowerCase().includes('oauth');
      const isPermission   = code === 200 || code === 10 || msg.toLowerCase().includes('permission');

      // If token is invalid/expired, clear it and show guide
      if (isTokenError) {
        localStorage.removeItem('meta_ads_token');
        resultsEl.innerHTML = '';
        showAdLibTokenGuide();
        toast('토큰이 만료됐거나 잘못됐습니다. 새 토큰을 발급해주세요', 'warn');
        return;
      }

      resultsEl.innerHTML = `<div style="background:#fef2f2;border-radius:12px;padding:20px;color:#991b1b">
        <div style="font-size:14px;font-weight:700;margin-bottom:8px">${ic('alert-circle',15,'#ef4444')} API 오류 (${code})</div>
        <div style="font-size:13px;margin-bottom:12px">${msg}</div>
        ${isPermission ? `<div style="font-size:12.5px;background:#fee2e2;padding:12px;border-radius:9px;line-height:1.7">
          <b>해결 방법:</b><br>
          1. <a href="https://developers.facebook.com/tools/explorer" target="_blank" style="color:#1e40af">Graph API Explorer</a> 접속<br>
          2. <code>ads_read</code> 권한 선택 후 새 토큰 발급<br>
          3. 위 "토큰 변경" 버튼으로 새 토큰 입력
        </div>` : `<div style="margin-top:10px"><button onclick="showAdLibTokenGuide()" class="btn-ghost" style="font-size:13px">토큰 재설정</button></div>`}
      </div>`;
      return;
    }

    adLibResults = data.data || [];
    resultsEl.innerHTML = renderAdLibResults(adLibResults);
    ri();

    if (adLibResults.length) {
      toast(`"${query}" 광고 ${adLibResults.length}개 검색됨`, 'success');
    }
  } catch(e) {
    resultsEl.innerHTML = `<div style="background:#fef2f2;border-radius:12px;padding:20px;color:#991b1b;font-size:13px">
      <b>네트워크 오류:</b> ${e.message}
    </div>`;
  }
}

function showAdLibTokenGuide() {
  const saved = localStorage.getItem('meta_ads_token') || '';
  const html = `
    <div class="modal-title">Meta 광고 라이브러리 토큰</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.7">
      Meta 광고 라이브러리 API는 <b>Facebook Graph API 토큰</b>이 필요합니다.<br>
      인스타그램 토큰과 다른 별도 토큰입니다.
    </div>
    <div style="background:var(--input-bg);border-radius:10px;padding:14px;margin-bottom:14px;font-size:12.5px;line-height:1.9">
      <b>🔑 토큰 발급 방법 (1분)</b><br>
      1. <a href="https://developers.facebook.com/tools/explorer" target="_blank" style="color:var(--brand);font-weight:600">Meta Graph API Explorer</a> 접속<br>
      2. 우측 <b>권한 추가</b> 드롭다운에서 <code style="background:#e5e7eb;padding:1px 5px;border-radius:4px">ads_read</code> 추가<br>
      3. <b>Generate Access Token</b> (파란 버튼) 클릭<br>
      4. 팝업에서 로그인/허용 승인<br>
      5. 상단 액세스 토큰 복사 후 아래 입력
    </div>
    <div style="background:#fff7ed;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#92400e">
      ⚠️ 토큰 유효기간: 약 1~2시간 (단기 토큰) · 만료 시 재발급 필요
    </div>
    <input id="adLibTokenInput" class="form-input" style="width:100%;font-size:13px;margin-bottom:12px;font-family:monospace"

    <div style="display:flex;gap:8px">

      <button class="btn-ghost" style="flex:1" onclick="closeModal()">취소</button>
    </div>`;
  openModal(html);
}

window.saveAdLibToken = function() {
  const val = (document.getElementById('adLibTokenInput')?.value || '').trim();
  if (!val) { toast('토큰을 입력하세요', 'warn'); return; }
  localStorage.setItem('meta_ads_token', val);
  closeModal();
  navigate('adlibrary');
  setTimeout(() => {
    const input = document.getElementById('adLibInput');
    if (input && adLibQuery) { input.value = adLibQuery; adLibSearch(); }
    else toast('토큰이 저장됐습니다. 이제 검색해보세요', 'success');
  }, 100);
};

window.adLibQuickSearch = function(name) {
  adLibQuery = name;
  navigate('adlibrary');
  // Auto-search after render
  setTimeout(() => {
    const input = document.getElementById('adLibInput');
    if (input) { input.value = name; adLibSearch(); }
  }, 100);
};

let curPage='overview';
function navigate(page){
  curPage=page;
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  document.getElementById('mainContent').innerHTML=pages[page]?pages[page]():'';
  // wrap bare tables for horizontal scroll

    <div class="form-row">
      <div class="form-group"><label>시작일</label><input type="date" class="form-input"/></div>
      <div class="form-group"><label>종료일</label><input type="date" class="form-input"/></div>
    </div>
    <div class="form-group"><label>포함할 지표</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:5px">
        ${['지출','ROAS','CTR','CPC','전환수','도달수','노출수','CPM'].map(m=>`<label style="display:flex;align-items:center;gap:4px;font-size:12.5px;cursor:pointer;padding:4px 9px;border:1px solid var(--border);border-radius:7px"><input type="checkbox" checked style="accent-color:#1877f2"/> ${m}</label>`).join('')}
      </div>
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center;background:#1877f2" onclick="toast('리포트가 생성되었습니다!','success');closeModal()">
      ${ic('file-text',13,'#fff')} 리포트 생성
    </button>`);
}

function exportReport(){
  const rows=[['캠페인명','목적','상태','지출','도달','CTR','ROAS','전환'],...campaigns.map(c=>[c.name,c.obj,statusMap[c.status].label,c.spend,c.reach,c.ctr,c.roas,c.conv])];
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'})),download:'meta_ads_report.csv'});
  a.click();URL.revokeObjectURL(a.href);
  toast('AdPulse 리포트 다운로드 완료!','success');
}
function exportCampCSV(){exportReport();}

function filterCamps(btn,filter){
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered=filter==='전체'?campaigns:campaigns.filter(c=>({활성:'active',일시중지:'pause',종료:'end'}[filter]===c.status));
  document.querySelector('#campTable tbody').innerHTML=renderCampRows(filtered);
  ri();
}

function switchPeriod(btn,p){
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  toast(p+' 데이터로 업데이트됐습니다','info');
}

function switchInsightTab(tab,name){
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));
  tab.classList.add('on');
  toast(name+' 분석 준비 중입니다','info');
}

// ══ SIDEBAR TOGGLE (mobile) ══════════════
const sidebar=document.querySelector('.sidebar');
const overlay=document.getElementById('sidebarOverlay');
document.getElementById('hamburgerBtn').onclick=()=>{
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
  ri();
};
overlay.onclick=()=>{
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
};
sidebar.querySelectorAll('.nav-item,.back-btn').forEach(el=>el.addEventListener('click',()=>{
  if(window.innerWidth<=900){
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  }
}));
window.addEventListener('resize',()=>{
  if(window.innerWidth>900){
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  }
});

// ══ TOPBAR ══════════════════════════════
let isDark=false;
document.getElementById('themeBtn').onclick=()=>{
  isDark=!isDark;
  document.body.classList.toggle('dark',isDark);
  document.getElementById('themeBtn').innerHTML=`<i data-lucide="${isDark?'moon':'sun'}" style="width:15px;height:15px"></i>`;
  ri();toast(isDark?'다크 모드 켜짐':'라이트 모드 켜짐','info');
};

document.querySelectorAll('.nav-item[data-page]').forEach(el=>{el.onclick=()=>navigate(el.dataset.page);});
document.querySelector('.back-btn').onclick=()=>{window.location.href='/dashboard';};

// ══ INIT ════════════════════════════════
navigate('overview');
// 저장된 연결이 있으면 자동으로 실제 데이터 로드
if(getMetaToken()&&getMetaAccountId()){
  loadRealAdsData().then(ok=>{ if(ok) navigate('overview'); });
}

const style=document.createElement('style');
style.textContent=`.stoggle{width:40px;height:22px;background:var(--border);border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}.stoggle.on{background:#1877f2}.stoggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}.stoggle.on::after{transform:translateX(18px)}.num-pos{color:#10b981;font-weight:600}`;
document.head.appendChild(style);
</script>
